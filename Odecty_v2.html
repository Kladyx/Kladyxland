<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ODEČTY – UTILITY TRACKER</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0c10; --panel:#0e1118; --border:rgba(0,245,255,.15);
  --accent:#00f5ff; --accent2:#00ff88; --warn:#ff4466;
  --text:#c8d8e8; --muted:rgba(200,216,232,.4);
  --water:#00d4ff; --gas:#ff8c00; --elec:#ffe033;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);font-family:'Share Tech Mono',monospace;
  color:var(--text);min-height:100vh;padding:20px 14px 60px;
  background-image:
    radial-gradient(ellipse at 20% 0%,rgba(0,245,255,.04) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 100%,rgba(0,255,136,.04) 0%,transparent 60%);
}

/* ── HEADER ── */
header{text-align:center;margin-bottom:22px;animation:fadeDown .4s ease both;}
.title-top{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:3px;}
.title-year{font-family:'Orbitron',monospace;font-size:.58rem;letter-spacing:.3em;color:var(--accent);opacity:.6;}
.ver-badge{font-family:'Orbitron',monospace;font-size:.52rem;letter-spacing:.08em;color:rgba(0,255,136,.55);border:1px solid rgba(0,255,136,.2);padding:2px 7px;border-radius:3px;}
header h1{font-family:'Orbitron',monospace;font-size:1.55rem;font-weight:900;letter-spacing:.12em;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hline{margin:8px auto 0;width:100px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}

/* ── NAV TABS ── */
.nav-tabs{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;max-width:900px;margin:0 auto 20px;}
.nav-btn{font-family:'Share Tech Mono',monospace;font-size:.63rem;letter-spacing:.07em;padding:6px 14px;border-radius:5px;border:1px solid rgba(0,245,255,.2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;text-transform:uppercase;}
.nav-btn:hover{border-color:var(--accent);color:var(--text);}
.nav-btn.active{background:rgba(0,245,255,.1);border-color:var(--accent);color:var(--accent);}
.nav-btn.print-nav{border-color:rgba(0,255,136,.25);color:rgba(0,255,136,.6);}
.nav-btn.print-nav.active,.nav-btn.print-nav:hover{background:rgba(0,255,136,.1);border-color:var(--accent2);color:var(--accent2);}

/* ── MONTH BAR ── */
.month-bar{display:flex;align-items:center;justify-content:center;gap:5px;flex-wrap:wrap;max-width:900px;margin:0 auto 16px;}
.month-btn{
  font-family:'Share Tech Mono',monospace;font-size:.63rem;letter-spacing:.05em;
  padding:5px 10px;border-radius:5px;border:1px solid rgba(0,245,255,.2);
  background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;
  text-transform:uppercase;position:relative;
}
.month-btn:hover{border-color:var(--accent);color:var(--text);}
.month-btn.active{background:rgba(0,245,255,.1);border-color:var(--accent);color:var(--accent);}
.month-btn.today-month{border-color:rgba(0,255,136,.45)!important;color:var(--accent2)!important;}
.month-btn.today-month.active{background:rgba(0,255,136,.12)!important;}
.month-dots{display:flex;justify-content:center;gap:2px;position:absolute;bottom:3px;left:50%;transform:translateX(-50%);}
.mdot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.15);}
.mdot.w{background:var(--water);}
.mdot.g{background:var(--gas);}
.mdot.e{background:var(--elec);}

.month-label{font-family:'Orbitron',monospace;font-size:.72rem;letter-spacing:.15em;color:var(--accent);text-align:center;margin-bottom:18px;opacity:.8;}

/* ── PANELS ── */
.panel{display:none;animation:fadeUp .3s ease both;}
.panel.active{display:block;}

/* ── CARDS GRID ── */
.grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:11px;max-width:900px;margin:0 auto 20px;}

.ucard{
  background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:16px 18px;display:flex;flex-direction:column;gap:9px;
  animation:fadeUp .35s ease both;transition:border-color .2s,box-shadow .2s;
  position:relative;overflow:hidden;
}
.ucard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .2s;}
.ucard:hover{border-color:rgba(0,245,255,.3);box-shadow:0 0 16px rgba(0,245,255,.06);}
.ucard:hover::before{opacity:1;}
.ucard.water-card::before{background:linear-gradient(90deg,transparent,var(--water),transparent);}
.ucard.gas-card::before{background:linear-gradient(90deg,transparent,var(--gas),transparent);}
.ucard.elec-card::before{background:linear-gradient(90deg,transparent,var(--elec),transparent);}
.ucard.has-value{border-color:rgba(0,255,136,.35);background:linear-gradient(135deg,var(--panel),rgba(0,255,136,.05));}

.ucard-top{display:flex;align-items:center;gap:8px;}
.ucard-icon{font-size:1.3rem;line-height:1;flex-shrink:0;}
.ucard-name{font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700;letter-spacing:.1em;flex:1;text-transform:uppercase;}
.ucard-name.water{color:var(--water);}
.ucard-name.gas{color:var(--gas);}
.ucard-name.elec{color:var(--elec);}
.ucard-unit{font-size:.6rem;color:var(--muted);letter-spacing:.1em;}

.ucard-saved{display:flex;align-items:center;justify-content:space-between;min-height:22px;}
.saved-val{font-family:'Orbitron',monospace;font-size:.88rem;font-weight:700;color:var(--accent2);}
.saved-label{font-size:.6rem;color:var(--muted);letter-spacing:.06em;}
.saved-empty{font-size:.63rem;color:rgba(200,216,232,.25);letter-spacing:.06em;}

.ucard-input{
  font-family:'Share Tech Mono',monospace;font-size:.78rem;
  background:rgba(0,0,0,.35);border:1px solid rgba(0,245,255,.2);
  border-radius:5px;color:var(--text);padding:8px 12px;
  outline:none;transition:border-color .2s;width:100%;
}
.ucard-input::placeholder{color:var(--muted);}
.ucard-input:focus{border-color:var(--accent);}

.ucard-btns{display:flex;gap:7px;}
.btn-save{
  font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:.1em;
  text-transform:uppercase;background:rgba(0,245,255,.1);
  border:1px solid rgba(0,245,255,.3);color:var(--accent);
  border-radius:4px;padding:7px 14px;cursor:pointer;transition:all .15s;flex:1;
}
.btn-save:hover{background:rgba(0,245,255,.2);}
.btn-del-v{
  background:rgba(255,68,102,.1);border:1px solid rgba(255,68,102,.3);
  border-radius:4px;color:var(--warn);cursor:pointer;font-size:.7rem;
  padding:6px 10px;transition:all .15s;flex-shrink:0;
  font-family:'Share Tech Mono',monospace;
}
.btn-del-v:hover{background:rgba(255,68,102,.22);}

/* ── SUMMARY BOX ── */
.summary{max-width:900px;margin:0 auto 18px;background:var(--panel);border:1px solid rgba(0,245,255,.2);border-radius:8px;padding:18px 22px;}
.summary-title{font-family:'Orbitron',monospace;font-size:.62rem;letter-spacing:.18em;color:var(--muted);margin-bottom:13px;text-transform:uppercase;}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.73rem;}
.sum-label{color:var(--muted);}
.sum-val{font-family:'Orbitron',monospace;font-weight:700;}
.sum-val.ok{color:var(--accent2);}
.sum-val.miss{color:var(--warn);}
.sum-val.accent{color:var(--accent);}
.summary-month-del{margin-top:12px;}
.btn-del-month{
  font-family:'Orbitron',monospace;font-size:.58rem;letter-spacing:.1em;
  text-transform:uppercase;border:1px solid rgba(255,68,102,.3);
  background:rgba(255,68,102,.07);color:var(--warn);
  border-radius:4px;padding:7px 16px;cursor:pointer;transition:all .15s;width:100%;
}
.btn-del-month:hover{background:rgba(255,68,102,.18);}

/* ── ARCHIVE ── */
.arch-box{max-width:900px;margin:0 auto 12px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:15px 18px;}
.arch-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.arch-month-name{font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700;letter-spacing:.1em;color:var(--accent);}
.arch-today-badge{font-size:.6rem;color:var(--accent2);border:1px solid rgba(0,255,136,.3);padding:2px 7px;border-radius:3px;letter-spacing:.06em;}
.arch-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.73rem;}
.arch-row:last-of-type{border-bottom:none;}
.arch-icon-name{display:flex;align-items:center;gap:7px;}
.arch-icon{font-size:1rem;}
.arch-name{color:var(--muted);letter-spacing:.04em;}
.arch-right{display:flex;align-items:center;gap:10px;}
.arch-val{font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700;color:var(--accent2);}
.arch-val.missing{color:rgba(200,216,232,.2);font-size:.65rem;}
.arch-del-row{margin-top:10px;}
.btn-arch-del{
  font-family:'Orbitron',monospace;font-size:.56rem;letter-spacing:.1em;
  text-transform:uppercase;border:1px solid rgba(255,68,102,.3);
  background:rgba(255,68,102,.06);color:var(--warn);
  border-radius:4px;padding:6px 14px;cursor:pointer;transition:all .15s;width:100%;
}
.btn-arch-del:hover{background:rgba(255,68,102,.18);}
.inline-del-btn{
  font-family:'Share Tech Mono',monospace;font-size:.6rem;
  background:transparent;border:1px solid rgba(255,68,102,.3);
  color:var(--warn);border-radius:3px;padding:2px 7px;cursor:pointer;transition:all .15s;
}
.inline-del-btn:hover{background:rgba(255,68,102,.2);}

/* ── YEARLY ── */
.year-block{max-width:900px;margin:0 auto 18px;background:var(--panel);border:1px solid rgba(0,245,255,.12);border-radius:8px;padding:18px 20px;}
.year-title{font-family:'Orbitron',monospace;font-size:.82rem;font-weight:900;letter-spacing:.18em;color:var(--accent);margin-bottom:14px;text-transform:uppercase;}
.year-table{width:100%;border-collapse:collapse;font-size:.72rem;}
.year-table th{font-family:'Orbitron',monospace;font-size:.58rem;letter-spacing:.1em;color:var(--muted);text-align:right;padding:5px 8px;border-bottom:1px solid rgba(0,245,255,.12);text-transform:uppercase;}
.year-table th:first-child{text-align:left;}
.year-table td{padding:6px 8px;text-align:right;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text);}
.year-table td:first-child{text-align:left;color:var(--muted);letter-spacing:.04em;}
.year-table td.val{font-family:'Orbitron',monospace;font-size:.68rem;font-weight:700;color:var(--accent2);}
.year-table td.diff-pos{color:rgba(0,255,136,.7);font-size:.62rem;}
.year-table td.diff-neg{color:rgba(255,68,102,.7);font-size:.62rem;}
.year-stats{margin-top:14px;padding:12px 14px;background:rgba(0,245,255,.05);border:1px solid rgba(0,245,255,.12);border-radius:6px;}
.year-stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.7rem;}
.year-stat-row:last-child{border-bottom:none;}
.year-stat-label{color:var(--muted);}
.year-stat-val{font-family:'Orbitron',monospace;font-weight:700;color:var(--accent);font-size:.7rem;}
.year-stat-sub{color:var(--muted);font-size:.58rem;margin-left:8px;}

/* ── REPORT ── */
.report-toolbar{display:flex;gap:10px;flex-wrap:wrap;max-width:900px;margin:0 auto 18px;align-items:center;}
.btn-print{
  font-family:'Orbitron',monospace;font-size:.62rem;letter-spacing:.1em;
  text-transform:uppercase;background:rgba(0,255,136,.1);
  border:1px solid rgba(0,255,136,.3);color:var(--accent2);
  border-radius:5px;padding:9px 18px;cursor:pointer;transition:all .15s;white-space:nowrap;
}
.btn-print:hover{background:rgba(0,255,136,.22);}
.year-filter{
  font-family:'Share Tech Mono',monospace;font-size:.72rem;
  background:rgba(0,0,0,.4);border:1px solid rgba(0,245,255,.2);
  border-radius:5px;color:var(--text);padding:8px 12px;outline:none;cursor:pointer;
}
#report-preview{max-width:900px;margin:0 auto;background:#fff;color:#111;border-radius:8px;padding:24px 20px;font-family:'Courier New',monospace;box-shadow:0 0 40px rgba(0,212,255,.25);}
.rpt-header{text-align:center;border-bottom:3px double #111;padding-bottom:14px;margin-bottom:20px;}
.rpt-header h1{font-size:1.4rem;letter-spacing:4px;margin-bottom:4px;}
.rpt-header p{font-size:.82rem;color:#555;}
.rpt-year-group{margin-bottom:28px;}
.rpt-year-title{font-size:.72rem;letter-spacing:4px;text-transform:uppercase;color:#fff;background:#111;padding:6px 12px;margin-bottom:10px;}
.rpt-month-block{border:1px solid #ddd;border-radius:4px;margin-bottom:10px;overflow:hidden;page-break-inside:avoid;}
.rpt-month-header{background:#f0f0f0;padding:7px 12px;font-size:.88rem;font-weight:bold;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid #ddd;color:#222;}
.rpt-month-table{width:100%;border-collapse:collapse;font-size:.84rem;}
.rpt-month-table tr{border-bottom:1px solid #eee;}
.rpt-month-table tr:last-child{border-bottom:none;}
.rpt-month-table td{padding:6px 10px;}
.rpt-icon{width:28px;font-size:1rem;}
.rpt-label{color:#333;min-width:80px;}
.rpt-val{font-weight:bold;color:#111;min-width:90px;}
.rpt-diff-label{color:#999;font-size:.75rem;padding-left:16px;}
.rpt-diff{color:#0066aa;font-weight:bold;text-align:right;}
.rpt-diff.neg{color:#cc0000;}
.rpt-footer{margin-top:24px;padding-top:10px;border-top:1px solid #ccc;font-size:.72rem;color:#888;display:flex;justify-content:space-between;}

/* ── EI SECTION ── */
.ei-section{max-width:900px;margin:18px auto 0;background:var(--panel);border:1px solid rgba(0,245,255,.12);border-radius:8px;padding:18px 22px;}
.ei-title{font-family:'Orbitron',monospace;font-size:.62rem;letter-spacing:.18em;color:var(--muted);margin-bottom:14px;text-transform:uppercase;}
.ei-row{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}
.ei-btn{font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;border-radius:5px;padding:9px 15px;cursor:pointer;transition:all .15s;border:1px solid;white-space:nowrap;background:transparent;}
.ei-btn.export-btn{border-color:rgba(0,245,255,.3);color:var(--accent);background:rgba(0,245,255,.07);}
.ei-btn.export-btn:hover{background:rgba(0,245,255,.15);}
.ei-btn.import-btn{border-color:rgba(0,255,136,.3);color:var(--accent2);background:rgba(0,255,136,.07);}
.ei-btn.import-btn:hover{background:rgba(0,255,136,.15);}
.ei-btn.copy-btn{border-color:rgba(255,255,255,.12);color:var(--muted);}
.ei-btn.copy-btn:hover{color:var(--text);}
.ei-desc{font-size:.63rem;color:var(--muted);flex:1;}
.ei-textarea{font-family:'Share Tech Mono',monospace;font-size:.66rem;background:rgba(0,0,0,.3);border:1px solid rgba(0,245,255,.2);border-radius:5px;color:var(--text);padding:10px 12px;outline:none;width:100%;resize:vertical;min-height:65px;transition:border-color .2s;display:none;margin-top:8px;}
.ei-textarea:focus{border-color:var(--accent);}
.ei-textarea.show{display:block;}
.ei-msg{font-size:.63rem;margin-top:4px;min-height:16px;}
.ei-msg.ok{color:var(--accent2);}
.ei-msg.err{color:var(--warn);}
.ei-sep{border:none;border-top:1px solid rgba(255,255,255,.05);margin:14px 0;}

/* ── MISC ── */
.empty-msg{text-align:center;padding:28px;font-size:.7rem;color:var(--muted);letter-spacing:.06em;}
.section-max{max-width:900px;margin:0 auto;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:none;}}

@media(max-width:600px){
  .grid-3{grid-template-columns:1fr;}
  header h1{font-size:1.2rem;}
}

@media print{
  body{background:#fff!important;color:#111!important;}
  header,nav,.nav-tabs,.month-bar,.month-label,.panel,.ei-section,#report-preview{display:none!important;}
  #report-print-target{display:block!important;padding:16px!important;background:#fff!important;}
  #report-preview-print .rpt-year-title{background:#111!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  #report-preview-print .rpt-month-header{background:#f0f0f0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
#report-print-target{display:none;}
</style>
</head>
<body>

<header>
  <div class="title-top">
    <div class="title-year">UTILITY TRACKER · 2026</div>
    <div class="ver-badge">ver.2.0</div>
  </div>
  <h1>ODEČTY</h1>
  <div class="hline"></div>
</header>

<!-- NAV TABS -->
<div class="nav-tabs">
  <button class="nav-btn active" onclick="switchPanel('input',this)">ZÁPIS</button>
  <button class="nav-btn" onclick="switchPanel('archive',this)">ARCHIV</button>
  <button class="nav-btn" onclick="switchPanel('yearly',this)">ROČNÍ PŘEHLED</button>
  <button class="nav-btn print-nav" onclick="switchPanel('report',this)">🖨 SESTAVA</button>
</div>

<!-- MONTH BAR (shared, always visible) -->
<div class="month-bar" id="month-bar"></div>
<div class="month-label" id="month-label"></div>

<!-- ── PANEL: ZÁPIS ── -->
<div class="panel active" id="panel-input">

  <div class="grid-3" id="input-cards"></div>

  <div class="summary" id="input-summary">
    <div class="summary-title">// Přehled měsíce</div>
    <div class="summary-row"><span class="sum-label">Zadáno hodnot</span><span class="sum-val ok" id="s-done">—</span></div>
    <div class="summary-row"><span class="sum-label">Chybí hodnot</span><span class="sum-val miss" id="s-miss">—</span></div>
    <div class="summary-row"><span class="sum-label">Stav</span><span class="sum-val accent" id="s-status">—</span></div>
    <div class="summary-month-del" id="del-month-wrap" style="display:none;">
      <button class="btn-del-month" id="btn-del-this-month">🗑 SMAZAT CELÝ MĚSÍC</button>
    </div>
  </div>

</div>

<!-- ── PANEL: ARCHIV ── -->
<div class="panel" id="panel-archive">
  <div class="section-max" id="archive-content"></div>
</div>

<!-- ── PANEL: ROČNÍ PŘEHLED ── -->
<div class="panel" id="panel-yearly">
  <div id="yearly-content"></div>
</div>

<!-- ── PANEL: SESTAVA ── -->
<div class="panel" id="panel-report">
  <div class="report-toolbar">
    <button class="btn-print" onclick="printReport()">🖨 TISKNOUT</button>
    <select class="year-filter" id="report-year-filter" onchange="buildReport()">
      <option value="all">Všechny roky</option>
    </select>
  </div>
  <div id="report-preview"></div>
</div>

<!-- EI SECTION (always visible) -->
<div class="ei-section">
  <div class="ei-title">// Záloha dat · Export / Import</div>
  <div class="ei-row">
    <button class="ei-btn export-btn" id="btn-export">⬆ Export dat</button>
    <span class="ei-desc">Vygeneruje kód — zkopíruj a ulož</span>
  </div>
  <textarea class="ei-textarea" id="ta-export" readonly></textarea>
  <div id="row-copy" style="display:none;">
    <div class="ei-row" style="margin-top:6px;">
      <button class="ei-btn copy-btn" id="btn-copy">⧉ Kopírovat do schránky</button>
    </div>
    <div class="ei-msg ok" id="copy-msg"></div>
  </div>
  <hr class="ei-sep"/>
  <div class="ei-row">
    <button class="ei-btn import-btn" id="btn-import-show">⬇ Importovat data</button>
    <span class="ei-desc">Vlož kód z exportu → obnoví všechna data</span>
  </div>
  <textarea class="ei-textarea" id="ta-import" placeholder="Vlož sem exportovaný kód…"></textarea>
  <div id="row-import-go" style="display:none;">
    <div class="ei-row" style="margin-top:6px;">
      <button class="ei-btn import-btn" id="btn-import-go">⬇ Načíst data</button>
    </div>
    <div class="ei-msg" id="import-msg"></div>
  </div>
</div>

<div id="report-print-target"></div>

<script>
// ── CONSTANTS ──
const MONTHS=['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
const MONTHS_SHORT=['Led','Úno','Bře','Dub','Kvě','Čvn','Čvc','Srp','Zář','Říj','Lis','Pro'];
const SK='utility-records';

const today = new Date();
const todayYM = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0');

let currentMonth = todayYM; // 'YYYY-MM'

// ── STORAGE ──
function getRecords(){
  return JSON.parse(localStorage.getItem(SK)||'{"water":[],"gas":[],"electric":[]}');
}
function saveRecords(r){ localStorage.setItem(SK,JSON.stringify(r)); }

function getVal(records,type,ym){
  const r=records[type].find(x=>x.date.startsWith(ym));
  return r?r.value:null;
}
function hasVal(records,type,ym){ return getVal(records,type,ym)!==null; }

function setVal(type,ym,value){
  let r=getRecords();
  r[type]=r[type].filter(x=>!x.date.startsWith(ym));
  if(value!==null) r[type].push({value:parseFloat(value),date:ym+'-01'});
  r[type].sort((a,b)=>new Date(a.date)-new Date(b.date));
  saveRecords(r);
}

function deleteVal(type,ym){ setVal(type,ym,null); }
function deleteMonth(ym){
  let r=getRecords();
  ['water','gas','electric'].forEach(t=>{ r[t]=r[t].filter(x=>!x.date.startsWith(ym)); });
  saveRecords(r);
}

// ── FORMAT ──
function fmtMonth(ym){
  const [y,m]=ym.split('-');
  return MONTHS[parseInt(m)-1]+' '+y;
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── MONTH BAR ──
function renderMonthBar(){
  const bar=document.getElementById('month-bar'); bar.innerHTML='';
  const yr=parseInt(currentMonth.split('-')[0]);
  for(let m=1;m<=12;m++){
    const ym=yr+'-'+String(m).padStart(2,'0');
    const r=getRecords();
    const hasW=hasVal(r,'water',ym), hasG=hasVal(r,'gas',ym), hasE=hasVal(r,'electric',ym);
    const isToday=ym===todayYM;
    const isActive=ym===currentMonth;

    const b=document.createElement('button');
    b.style.paddingBottom='16px';
    let cls='month-btn';
    if(isToday) cls+=' today-month';
    if(isActive) cls+=' active';
    b.className=cls;
    b.innerHTML=MONTHS_SHORT[m-1]+
      '<div class="month-dots">'+
        '<div class="mdot'+(hasW?' w':'')+'"></div>'+
        '<div class="mdot'+(hasG?' g':'')+'"></div>'+
        '<div class="mdot'+(hasE?' e':'')+'"></div>'+
      '</div>';
    b.onclick=()=>{ currentMonth=ym; refresh(); };
    bar.appendChild(b);
  }
  document.getElementById('month-label').textContent=fmtMonth(currentMonth);
}

// ── INPUT CARDS ──
function renderInputCards(){
  const r=getRecords();
  const types=[
    {key:'water',icon:'💧',name:'VODA',unit:'m³',cls:'water-card',nameCls:'water'},
    {key:'gas',  icon:'🔥',name:'PLYN',unit:'m³',cls:'gas-card',  nameCls:'gas'},
    {key:'electric',icon:'⚡',name:'ELEKTŘINA',unit:'kWh',cls:'elec-card',nameCls:'elec'},
  ];
  const grid=document.getElementById('input-cards'); grid.innerHTML='';
  types.forEach(({key,icon,name,unit,cls,nameCls},i)=>{
    const val=getVal(r,key,currentMonth);
    const hasSaved=val!==null;
    const card=document.createElement('div');
    card.id='card-'+key;
    card.className='ucard '+cls+(hasSaved?' has-value':'');
    card.style.animationDelay=(i*.06)+'s';
    card.innerHTML=`
      <div class="ucard-top">
        <span class="ucard-icon">${icon}</span>
        <span class="ucard-name ${nameCls}">${name}</span>
        <span class="ucard-unit">${unit}</span>
      </div>
      <div class="ucard-saved">
        ${hasSaved
          ? `<span class="saved-label">ULOŽENO</span><span class="saved-val">${val} <span style="font-size:.6rem;font-weight:400;">${unit}</span></span>`
          : `<span class="saved-empty">— není zadáno —</span>`
        }
      </div>
      <input class="ucard-input" id="inp-${key}" type="number" step="0.1" placeholder="${hasSaved?'Přepsat hodnotu…':'Zadej odečet…'}"/>
      <div class="ucard-btns">
        <button class="btn-save" onclick="saveVal('${key}')">✓ Uložit</button>
        ${hasSaved?`<button class="btn-del-v" onclick="removeVal('${key}')" title="Smazat hodnotu">✕</button>`:''}
      </div>`;
    grid.appendChild(card);
  });
}

function saveVal(type){
  const inp=document.getElementById('inp-'+type);
  const v=inp.value.trim();
  if(!v){ flash(inp); return; }
  setVal(type,currentMonth,v);
  refresh();
  // auto-advance if all done
  const r=getRecords();
  if(['water','gas','electric'].every(t=>hasVal(r,t,currentMonth))){
    const [y,m]=currentMonth.split('-').map(Number);
    const nd=new Date(y,m,1);
    const nm=nd.getFullYear()+'-'+String(nd.getMonth()+1).padStart(2,'0');
    setTimeout(()=>{ currentMonth=nm; refresh(); },800);
  }
}

function flash(inp){
  inp.style.borderColor='var(--warn)';
  setTimeout(()=>inp.style.borderColor='',600);
}

function removeVal(type){
  const r=getRecords();
  const val=getVal(r,type,currentMonth);
  if(val===null) return;
  const names={water:'Voda',gas:'Plyn',electric:'Elektřina'};
  // inline confirm inside the card
  const card=document.getElementById('card-'+type);
  const btns=card.querySelector('.ucard-btns');
  btns.innerHTML=`<span style="font-size:.62rem;color:var(--warn);letter-spacing:.04em;">Smazat ${names[type]}?</span>
    <button class="btn-save" style="background:rgba(255,68,102,.15);border-color:rgba(255,68,102,.4);color:var(--warn);" id="cf-${type}">ANO</button>
    <button class="btn-del-v" id="cn-${type}">NE</button>`;
  document.getElementById('cf-'+type).onclick=()=>{ deleteVal(type,currentMonth); refresh(); };
  document.getElementById('cn-'+type).onclick=()=>refresh();
}

// ── INPUT SUMMARY ──
function renderInputSummary(){
  const r=getRecords();
  const done=['water','gas','electric'].filter(t=>hasVal(r,t,currentMonth)).length;
  const miss=3-done;
  const hasAny=done>0;
  document.getElementById('s-done').textContent=done+' / 3';
  document.getElementById('s-miss').textContent=miss>0?miss:'—';
  document.getElementById('s-status').textContent=done===3?'✓ KOMPLETNÍ':done>0?'NEÚPLNÉ':'PRÁZDNÝ';
  document.getElementById('del-month-wrap').style.display=hasAny?'block':'none';
  const btn=document.getElementById('btn-del-this-month');
  btn.onclick=()=>{
    const wrap=document.getElementById('del-month-wrap');
    wrap.innerHTML=`<div style="font-size:.63rem;color:var(--warn);margin-bottom:7px;letter-spacing:.04em;">Smazat celý měsíc ${fmtMonth(currentMonth)}?</div>
      <div style="display:flex;gap:8px;">
        <button class="btn-del-month" id="cf-month" style="background:rgba(255,68,102,.2);">ANO, smazat</button>
        <button class="btn-del-month" id="cn-month" style="border-color:rgba(200,216,232,.2);color:var(--muted);background:transparent;">Zrušit</button>
      </div>`;
    document.getElementById('cf-month').onclick=()=>{ deleteMonth(currentMonth); refresh(); };
    document.getElementById('cn-month').onclick=()=>renderInputSummary();
  };
}

// ── PANEL SWITCH ──
function switchPanel(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  if(id==='archive') renderArchive();
  if(id==='yearly')  renderYearly();
  if(id==='report')  { populateYearFilter(); buildReport(); }
}

// ── ARCHIVE ──
function renderArchive(){
  const r=getRecords();
  const monthMap={};
  ['water','gas','electric'].forEach(t=>{
    r[t].forEach(x=>{
      const k=x.date.slice(0,7);
      if(!monthMap[k]) monthMap[k]={water:null,gas:null,electric:null};
      monthMap[k][t]=x.value;
    });
  });
  const keys=Object.keys(monthMap).sort().reverse();
  const el=document.getElementById('archive-content');
  if(!keys.length){ el.innerHTML='<div class="empty-msg">// žádné záznamy</div>'; return; }

  el.innerHTML=keys.map(ym=>{
    const d=monthMap[ym];
    const isToday=ym===todayYM;
    const ymid=ym.replace('-','');
    const rows=[
      {icon:'💧',name:'Voda',type:'water',unit:'m³',val:d.water},
      {icon:'🔥',name:'Plyn',type:'gas',unit:'m³',val:d.gas},
      {icon:'⚡',name:'Elektřina',type:'electric',unit:'kWh',val:d.electric},
    ];
    return `<div class="arch-box">
      <div class="arch-head">
        <span class="arch-month-name">${fmtMonth(ym)}</span>
        ${isToday?'<span class="arch-today-badge">● AKTUÁLNÍ</span>':''}
      </div>
      ${rows.map(({icon,name,type,unit,val})=>`
        <div class="arch-row">
          <div class="arch-icon-name"><span class="arch-icon">${icon}</span><span class="arch-name">${name}</span></div>
          <div class="arch-right">
            ${val!==null
              ?`<span class="arch-val">${val} ${unit}</span>
                <button class="inline-del-btn" id="adv-${type}-${ymid}" onclick="archDelVal('${type}','${ym}')">✕</button>`
              :`<span class="arch-val missing">—</span>`}
          </div>
        </div>`).join('')}
      <div class="arch-del-row">
        <button class="btn-arch-del" id="adm-${ymid}" onclick="archDelMonth('${ym}')">🗑 SMAZAT CELÝ MĚSÍC</button>
      </div>
    </div>`;
  }).join('');
}

function archDelVal(type,ym){
  const r=getRecords();
  const val=getVal(r,type,ym);
  if(val===null) return;
  const names={water:'Voda',gas:'Plyn',electric:'Elektřina'};
  // find the button that triggered this and replace inline
  const id='adv-'+type+'-'+ym.replace('-','');
  const btn=document.getElementById(id);
  if(!btn) return;
  const orig=btn.outerHTML;
  btn.outerHTML=`<span id="adv-cf-wrap-${type}">
    <button class="inline-del-btn" style="color:var(--warn);border-color:rgba(255,68,102,.5);" id="adv-cf-${type}">ANO</button>
    <button class="inline-del-btn" style="color:var(--muted);border-color:rgba(200,216,232,.15);" id="adv-cn-${type}">NE</button>
  </span>`;
  document.getElementById('adv-cf-'+type).onclick=()=>{ deleteVal(type,ym); renderArchive(); renderMonthBar(); renderInputCards(); renderInputSummary(); };
  document.getElementById('adv-cn-'+type).onclick=()=>renderArchive();
}

function archDelMonth(ym){
  const id='adm-'+ym.replace('-','');
  const btn=document.getElementById(id);
  if(!btn) return;
  btn.outerHTML=`<div id="adm-cf-wrap-${ym.replace('-','')}">
    <div style="font-size:.6rem;color:var(--warn);margin-bottom:6px;">Smazat ${fmtMonth(ym)}?</div>
    <div style="display:flex;gap:7px;">
      <button class="btn-arch-del" style="background:rgba(255,68,102,.2);" id="adm-cf-${ym.replace('-','')}">ANO, smazat</button>
      <button class="btn-arch-del" style="border-color:rgba(200,216,232,.15);color:var(--muted);background:transparent;" id="adm-cn-${ym.replace('-','')}">Zrušit</button>
    </div>
  </div>`;
  document.getElementById('adm-cf-'+ym.replace('-','')).onclick=()=>{ deleteMonth(ym); renderArchive(); renderMonthBar(); renderInputCards(); renderInputSummary(); };
  document.getElementById('adm-cn-'+ym.replace('-','')).onclick=()=>renderArchive();
}

// ── YEARLY ──
function renderYearly(){
  const r=getRecords();
  const monthMap={};
  ['water','gas','electric'].forEach(t=>{
    r[t].forEach(x=>{
      const k=x.date.slice(0,7);
      if(!monthMap[k]) monthMap[k]={water:null,gas:null,electric:null};
      monthMap[k][t]=x.value;
    });
  });
  const allMs=Object.keys(monthMap).sort();
  if(!allMs.length){ document.getElementById('yearly-content').innerHTML='<div class="empty-msg">// žádné záznamy</div>'; return; }

  const yearMap={};
  allMs.forEach(m=>{ const y=m.split('-')[0]; if(!yearMap[y]) yearMap[y]=[]; yearMap[y].push(m); });

  let html='';
  Object.keys(yearMap).sort().reverse().forEach(year=>{
    const yms=yearMap[year];
    html+=`<div class="year-block">
      <div class="year-title">ROK ${year} &mdash; ${yms.length} měsíců</div>
      <div style="overflow-x:auto;">
      <table class="year-table">
        <thead><tr>
          <th>MĚSÍC</th>
          <th>💧 m³</th><th>Δ</th>
          <th>🔥 m³</th><th>Δ</th>
          <th>⚡ kWh</th><th>Δ</th>
        </tr></thead><tbody>`;

    [...yms].reverse().forEach(m=>{
      const d=monthMap[m];
      const idx=allMs.indexOf(m);
      const prev=idx>0?monthMap[allMs[idx-1]]:null;
      const dW=(d.water!=null&&prev&&prev.water!=null)?(d.water-prev.water).toFixed(1):null;
      const dG=(d.gas!=null&&prev&&prev.gas!=null)?(d.gas-prev.gas).toFixed(1):null;
      const dE=(d.electric!=null&&prev&&prev.electric!=null)?(d.electric-prev.electric).toFixed(1):null;
      const fmtD=v=>v===null?'':
        `<span style="font-size:.62rem;color:${parseFloat(v)>=0?'rgba(0,255,136,.65)':'rgba(255,68,102,.75)'}">${parseFloat(v)>=0?'+':''}${v}</span>`;
      html+=`<tr>
        <td>${fmtMonth(m)}</td>
        <td class="val">${d.water!=null?d.water:'—'}</td><td>${fmtD(dW)}</td>
        <td class="val">${d.gas!=null?d.gas:'—'}</td><td>${fmtD(dG)}</td>
        <td class="val">${d.electric!=null?d.electric:'—'}</td><td>${fmtD(dE)}</td>
      </tr>`;
    });

    html+='</tbody></table></div>';

    // Yearly stats
    const allVals={water:[],gas:[],electric:[]};
    yms.forEach(m=>{ ['water','gas','electric'].forEach(t=>{ if(monthMap[m][t]!=null) allVals[t].push(monthMap[m][t]); }); });
    const gs=arr=>arr.length?{min:Math.min(...arr),max:Math.max(...arr),avg:(arr.reduce((a,b)=>a+b)/arr.length).toFixed(2),sum:arr.reduce((a,b)=>a+b,0).toFixed(2)}:null;

    html+='<div class="year-stats">';
    [['water','💧 Voda','m³'],['gas','🔥 Plyn','m³'],['electric','⚡ Elektřina','kWh']].forEach(([t,lbl,unit])=>{
      const s=gs(allVals[t]); if(!s) return;
      html+=`<div class="year-stat-row">
        <span class="year-stat-label">${lbl}</span>
        <span><span class="year-stat-val">${s.sum} ${unit}</span>
        <span class="year-stat-sub">ø ${s.avg} · min ${s.min} · max ${s.max}</span></span>
      </div>`;
    });
    html+='</div></div>';
  });
  document.getElementById('yearly-content').innerHTML=html;
}

// ── REPORT ──
function populateYearFilter(){
  const r=getRecords();
  const years=new Set();
  ['water','gas','electric'].forEach(t=>r[t].forEach(x=>years.add(x.date.split('-')[0])));
  const sel=document.getElementById('report-year-filter');
  const cur=sel.value;
  sel.innerHTML='<option value="all">Všechny roky</option>';
  [...years].sort().reverse().forEach(y=>{ const o=document.createElement('option'); o.value=y; o.textContent=y; if(y===cur) o.selected=true; sel.appendChild(o); });
}

function buildReport(){
  const r=getRecords();
  const fy=document.getElementById('report-year-filter').value;
  const mm={};
  ['water','gas','electric'].forEach(t=>{ r[t].forEach(x=>{ const y=x.date.split('-')[0]; if(fy!=='all'&&y!==fy) return; const k=x.date.slice(0,7); if(!mm[k]) mm[k]={water:null,gas:null,electric:null}; mm[k][t]=x.value; }); });
  const months=Object.keys(mm).sort();
  if(!months.length){ document.getElementById('report-preview').innerHTML='<div style="padding:20px;color:#888">Žádná data</div>'; return; }
  const now=new Date().toLocaleDateString('cs-CZ');
  const yl=fy==='all'?'Všechny záznamy':'Rok '+fy;
  const diff=(v,p)=>(v!=null&&p!=null)?(v-p).toFixed(2):null;
  const fD=d=>d===null?'—':(parseFloat(d)>=0?'+'+d:d);
  const fV=(v,u)=>v!=null?v+' '+u:'—';
  const yg={};
  months.forEach(m=>{ const y=m.split('-')[0]; if(!yg[y]) yg[y]=[]; yg[y].push(m); });
  let html=`<div class="rpt-header"><h1>UTILITY TRACKER</h1><p>${yl} &nbsp;|&nbsp; ${now}</p></div>`;
  Object.keys(yg).sort().reverse().forEach(year=>{
    const ym=yg[year];
    html+=`<div class="rpt-year-group"><div class="rpt-year-title">ROK ${year}</div>`;
    [...ym].reverse().forEach(m=>{
      const idx=months.indexOf(m); const d=mm[m]; const prev=idx>0?mm[months[idx-1]]:null;
      const dW=diff(d.water,prev?prev.water:null);
      const dG=diff(d.gas,prev?prev.gas:null);
      const dE=diff(d.electric,prev?prev.electric:null);
      html+=`<div class="rpt-month-block">
        <div class="rpt-month-header">${fmtMonth(m)}</div>
        <table class="rpt-month-table">
          <tr><td class="rpt-icon">💧</td><td class="rpt-label">Voda</td><td class="rpt-val">${fV(d.water,'m³')}</td><td class="rpt-diff-label">spotřeba</td><td class="rpt-diff${dW!==null&&parseFloat(dW)<0?' neg':''}">${fD(dW)}${dW!==null?' m³':''}</td></tr>
          <tr><td class="rpt-icon">🔥</td><td class="rpt-label">Plyn</td><td class="rpt-val">${fV(d.gas,'m³')}</td><td class="rpt-diff-label">spotřeba</td><td class="rpt-diff${dG!==null&&parseFloat(dG)<0?' neg':''}">${fD(dG)}${dG!==null?' m³':''}</td></tr>
          <tr><td class="rpt-icon">⚡</td><td class="rpt-label">Elektřina</td><td class="rpt-val">${fV(d.electric,'kWh')}</td><td class="rpt-diff-label">spotřeba</td><td class="rpt-diff${dE!==null&&parseFloat(dE)<0?' neg':''}">${fD(dE)}${dE!==null?' kWh':''}</td></tr>
        </table></div>`;
    });
    html+='</div>';
  });
  html+=`<div class="rpt-footer"><span>UTILITY TRACKER — automaticky generovaná sestava</span><span>${now}</span></div>`;
  document.getElementById('report-preview').innerHTML=html;
}

function printReport(){
  const c=document.getElementById('report-preview');
  if(!c||!c.innerHTML.trim()||c.querySelector('.empty-msg')){alert('Nejprve vygeneruj sestavu.');return;}
  const pt=document.getElementById('report-print-target');
  pt.innerHTML='<div id="report-preview-print">'+c.innerHTML+'</div>';
  window.print();
  setTimeout(()=>pt.innerHTML='',500);
}

// ── EXPORT / IMPORT ──
document.getElementById('btn-export').onclick=()=>{
  const ta=document.getElementById('ta-export');
  ta.value=localStorage.getItem(SK)||'{}';
  ta.classList.add('show');
  document.getElementById('row-copy').style.display='block';
  document.getElementById('copy-msg').textContent='';
};
document.getElementById('btn-copy').onclick=()=>{
  const ta=document.getElementById('ta-export'); ta.select(); ta.setSelectionRange(0,99999);
  const msg=document.getElementById('copy-msg');
  try{ navigator.clipboard.writeText(ta.value).then(()=>{msg.textContent='✓ Zkopírováno!'}); }
  catch(e){ document.execCommand('copy'); msg.textContent='✓ Zkopírováno!'; }
};
document.getElementById('btn-import-show').onclick=()=>{
  const ta=document.getElementById('ta-import');
  ta.classList.toggle('show');
  document.getElementById('row-import-go').style.display=ta.classList.contains('show')?'block':'none';
};
document.getElementById('btn-import-go').onclick=()=>{
  const msg=document.getElementById('import-msg');
  try{
    const data=JSON.parse(document.getElementById('ta-import').value.trim());
    if(!data.water&&!data.gas&&!data.electric) throw new Error();
    saveRecords(data);
    msg.className='ei-msg ok'; msg.textContent='✓ Data importována!';
    refresh();
  }catch(e){ msg.className='ei-msg err'; msg.textContent='✗ Chybný formát dat.'; }
};

// ── MAIN REFRESH ──
function refresh(){
  renderMonthBar();
  renderInputCards();
  renderInputSummary();
}

refresh();
</script>
