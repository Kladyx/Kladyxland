  <style>

    :root { --bg:#050810; --sidebar:#080d1c; --cyan:#00d4ff; --muted:#5a6488; --light:#dde4ff; --card:#0d1428; }
    html,body { width:100%; height:100%; background:var(--bg); font-family:"Courier New",monospace; color:var(--light); overflow:hidden; }
    .layout { display:flex; flex-direction:column; height:100vh; height:100dvh; }
    .topbar { display:flex; align-items:center; gap:8px; padding:8px 12px; background:var(--sidebar); border-bottom:1px solid rgba(0,212,255,0.2); flex-shrink:0; z-index:10; overflow-x:scroll; -webkit-overflow-scrolling:touch; scrollbar-width:none; touch-action:pan-x; }
    .topbar::-webkit-scrollbar { display:none; }
    .tlogo { font-size:0.7rem; font-weight:bold; letter-spacing:3px; color:var(--cyan); text-shadow:0 0 10px var(--cyan); white-space:nowrap; flex-shrink:0; }
    .tlogo span { font-size:0.48rem; color:var(--muted); letter-spacing:1px; display:block; }
    .tdiv { width:1px; height:24px; background:rgba(0,212,255,0.15); flex-shrink:0; }
    .app-btn { display:flex; flex-direction:column; align-items:center; gap:2px; padding:5px 9px; background:rgba(0,0,0,0.35); border:1px solid rgba(255,255,255,0.07); border-radius:7px; cursor:pointer; transition:all 0.2s; white-space:nowrap; flex-shrink:0; position:relative; min-width:54px; }
    .app-btn:hover { border-color:rgba(255,255,255,0.2); background:rgba(255,255,255,0.05); }
    .app-btn.active { border-color:var(--ac); background:rgba(var(--ac-rgb),0.12); box-shadow:0 0 12px rgba(var(--ac-rgb),0.25); }
    .bi { font-size:1.1rem; line-height:1; }
    .bl { font-size:0.52rem; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
    .app-btn.active .bl { color:var(--ac); }
    .bd { position:absolute; top:4px; right:5px; width:4px; height:4px; border-radius:50%; background:#00ff88; box-shadow:0 0 5px #00ff88; opacity:0; transition:opacity 0.3s; }
    .app-btn.active .bd { opacity:1; }
    .iframe-wrap { flex:1; position:relative; overflow:hidden; background:var(--bg); }
    .app-frame { position:absolute; inset:0; width:100%; height:100%; border:none; opacity:0; pointer-events:none; transition:opacity 0.25s; }
    .app-frame.visible { opacity:1; pointer-events:all; touch-action:auto; }
    .welcome { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:14px; padding:20px; padding-top:max(20px,8vh); text-align:center; overflow-y:auto; -webkit-overflow-scrolling:touch; transition:opacity 0.3s; }
    .welcome.hidden { opacity:0; pointer-events:none; }
    .wlogo { font-size:1.7rem; font-weight:bold; letter-spacing:6px; color:var(--cyan); text-shadow:0 0 25px var(--cyan); animation:glow 3s ease-in-out infinite; }
    @keyframes glow { 0%,100%{text-shadow:0 0 18px var(--cyan)} 50%{text-shadow:0 0 45px var(--cyan),0 0 70px rgba(0,212,255,0.4)} }
    .wsub { font-size:0.6rem; letter-spacing:3px; color:var(--muted); }
    .wgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; max-width:420px; width:100%; margin-top:6px; }
    @media(max-width:460px){ .wgrid { grid-template-columns:repeat(2,1fr); } }
    .wcard { background:var(--card); border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:12px 8px; cursor:pointer; transition:all 0.2s; display:flex; flex-direction:column; align-items:center; gap:4px; }
    .wcard:active { transform:scale(0.96); }
    .wi { font-size:1.5rem; }
    .wn { font-size:0.56rem; letter-spacing:1px; text-transform:uppercase; color:var(--light); }
    .wd { font-size:0.5rem; color:var(--muted); }
  </style>
</head>

var APP_HTML = {};
APP_HTML["housetime"] = `<!DOCTYPE html>

<body>

  <div class="logo">▬ NOW PLAYING ▬</div>
  <div class="station-name">HOUSETIME.FM</div>
  <div class="version">v1.0.En</div>

  <div class="live-badge">
    <div class="live-dot"></div>
    <span>LIVE</span>
  </div>

  <div class="now-card" id="nowCard">
    <div class="now-loading" id="loadingText">⏳ NAČÍTÁM…</div>
  </div>

  <button class="refresh-btn" id="refreshBtn" onclick="fetchNow()">↻ OBNOVIT</button>

  <div class="auto-refresh">
    <span>Auto-obnovení za</span>
    <span class="countdown" id="countdown">30</span>
    <span>s</span>
  </div>

  <div class="history-wrap" id="historyWrap" style="display:none">
    <div class="history-title">Předchozí skladby</div>
    <div id="historyList"></div>
  </div>

  <script>
    var history = [];
    var countdownVal = 30;
    var countdownTimer = null;
    var lastSong = '';

    // Zdroje dat — v pořadí priority
    // 1) Trackliste stránka housetime.fm (HTML scraping)
    // 2) Icecast status-json.xsl (správný stream server)
    // 3) ICY metadata z MP3 streamu
    var ENDPOINTS = [
      { url: 'https://www.housetime.fm/trackliste', type: 'trackliste' },
      { url: 'https://listen.housetime.fm/status-json.xsl', type: 'icecast' },
      { url: 'https://listen.housetime.fm/tunein-mp3', type: 'icy' },
    ];

    // null = přímý fetch (bez proxy)
    var PROXY_URLS = [
      null,
      function(u) { return 'https://corsproxy.io/?' + encodeURIComponent(u); },
      function(u) { return 'https://api.allorigins.win/get?url=' + encodeURIComponent(u); },
      function(u) { return 'https://thingproxy.freeboard.io/fetch/' + u; },
      function(u) { return 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u); },
    ];

    function fetchWithTimeout(url, ms, opts) {
      var ctrl = new AbortController();
      var id = setTimeout(function() { ctrl.abort(); }, ms);
      return fetch(url, Object.assign({ signal: ctrl.signal }, opts || {}))
        .finally(function() { clearTimeout(id); });
    }

    function fetchNow() {
      var btn = document.getElementById('refreshBtn');
      btn.disabled = true;
      showLoading();
      resetCountdown();
      tryEndpoint(0, 0);
    }

    function tryEndpoint(eIdx, pIdx) {
      if (eIdx >= ENDPOINTS.length) {
        document.getElementById('refreshBtn').disabled = false;
        showError('Nepodařilo se načíst data.<br>Zkus to znovu za chvíli.');
        return;
      }
      if (pIdx >= PROXY_URLS.length) {
        tryEndpoint(eIdx + 1, 0);
        return;
      }

      var ep = ENDPOINTS[eIdx];
      var proxyFn = PROXY_URLS[pIdx];
      var proxyUrl = proxyFn ? proxyFn(ep.url) : ep.url;
      var isAllorigins = proxyUrl.indexOf('allorigins') !== -1;

      // ICY metadata vyžaduje Range header — přes proxy to obvykle nefunguje,
      // takže pro typ 'icy' přeskočíme proxy (null) a jdeme rovnou na další endpoint
      if (ep.type === 'icy' && proxyFn !== null) {
        tryEndpoint(eIdx, pIdx + 1);
        return;
      }

      fetchWithTimeout(proxyUrl, 6000,
        ep.type === 'icy' ? { headers: { 'Icy-MetaData': '1' } } : {}
      )
        .then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return isAllorigins ? r.json() : r.text();
        })
        .then(function(data) {
          var raw = isAllorigins ? data.contents : data;
          if (!raw || raw.length < 10) throw new Error('empty');
          var result = parseResponse(raw, ep.type);
          if (!result) throw new Error('parse fail');
          document.getElementById('refreshBtn').disabled = false;
          showResult(result.artist, result.song);
          addHistory(result.artist, result.song);
        })
        .catch(function() {
          tryEndpoint(eIdx, pIdx + 1);
        });
    }

    function parseResponse(raw, type) {
      try {
        if (type === 'trackliste') {
          // WeAreOne trackliste: hledame <a href="/releases/...">Artist - Title</a>
          // Pouze linky vedouci na /releases/ — to jsou skladby, ne navigace
          var releaseRe = /<a\\s[^>]*href=["'][^"']*\\/releases\\/[^"']*["'][^>]*>([\\s\\S]*?)<\\/a>/gi;
          var m2;
          while ((m2 = releaseRe.exec(raw)) !== null) {
            var txt = m2[1].replace(/<[^>]+>/g, '').trim();
            if (txt && txt.length > 5 && txt.indexOf(' - ') !== -1) {
              return splitTitle(txt);
            }
          }
          return null;
        }

        if (type === 'icecast') {
          var json = JSON.parse(raw);

          if (!sources) return null;

          if (txt && txt.length > 5 && txt.indexOf(' - ') !== -1) {
            return splitTitle(txt);
          }
        }
      }
      return null;
    }

    function parseXspf(raw) {
      // Icecast XSPF: <title>Artist - Song</title> inside <track>
      var m = raw.match(/<annotation>([\\s\\S]*?)<\\/annotation>/i);
      if (!m) m = raw.match(/<title>([\\s\\S]*?)<\\/title>/i);
      if (m) {
        var txt = m[1].replace(/<[^>]+>/g, '').trim();
        if (txt && txt.length > 3 && txt !== 'Icecast' && txt.indexOf('puls') === -1) {
          return splitTitle(txt);
        }
      }
      return null;
    }

    function splitTitle(t) {
      if (t.indexOf(' - ') !== -1) {
        var p = t.split(' - ');
        return { artist: p[0].trim(), song: p.slice(1).join(' - ').trim() };
      }
      return { artist: '', song: t.trim() };
    }

    // ============================================================
    // UI
    function showLoading() {
      document.getElementById('nowCard').innerHTML =
        '<div class="now-loading">⏳ NAČÍTÁM…</div>';
    }

    function showResult(artist, song, stationName) {
      document.getElementById('nowCard').innerHTML =
        '<div class="now-label">PRÁVĚ HRAJE</div>' +
        '<div class="now-station-name">' + escHtml(stationName) + '</div>' +
        (artist ? '<div class="now-artist">' + escHtml(artist) + '</div>' : '') +
        '<div class="now-title">' + escHtml(song) + '</div>';
    }

    function showError(msg) {
      document.getElementById('nowCard').innerHTML =
        '<div class="now-error">⚠ ' + msg + '</div>';
    }

    function addHistory(artist, song) {
      var full = (artist ? artist + ' — ' : '') + song;
      if (full === lastSong) return;
      lastSong = full;
      var now = new Date().toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });
      trackHistory.unshift({ artist: artist, song: song, time: now });
      if (trackHistory.length > 10) trackHistory.pop();
      renderHistory();
    }

    function renderHistory() {
      if (trackHistory.length < 2) return;
      var wrap = document.getElementById('historyWrap');
      var list = document.getElementById('historyList');
      wrap.style.display = 'block';
      var html = '';
      for (var i = 1; i < trackHistory.length; i++) {
        var h = trackHistory[i];
        html += '<div class="history-item">' +
          '<div>' +
            '<div class="history-song">' + escHtml(h.song) + '</div>' +
            (h.artist ? '<div class="history-artist">' + escHtml(h.artist) + '</div>' : '') +
          '</div>' +
          '<div class="history-time">' + h.time + '</div>' +
          '</div>';
      }
      list.innerHTML = html;
    }

    function resetCountdown() {
      countdownVal = 30;
      document.getElementById('countdown').textContent = countdownVal;
      if (countdownTimer) clearInterval(countdownTimer);
      countdownTimer = setInterval(function() {
        countdownVal--;
        document.getElementById('countdown').textContent = countdownVal;
        if (countdownVal <= 0) fetchNow();
      }, 1000);
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // ============================================================
    initStations();
    fetchNow();

      return JSON.parse(localStorage.getItem('utility-records') || '{"water":[],"gas":[],"electric":[]}');

    function hasRecordForMonth(records, type, month) {
      return records[type].some(r => r.date.startsWith(month));

    function updateCardState() {
      const records = getRecords();
      ['water', 'gas', 'electric'].forEach(type => {
        const card = document.getElementById('card-' + type);
        const dot = document.getElementById('dot-' + type);
        const saved = hasRecordForMonth(records, type, currentMonth);
        if (saved) {
          card.classList.add('saved');
          if (!card.querySelector('.card-saved-badge')) {
            const badge = document.createElement('div');
            badge.className = 'card-saved-badge';
            badge.textContent = '✓ ULOŽENO';
            card.appendChild(badge);
          }
          dot.classList.add('done');
        } else {
          card.classList.remove('saved');
          const b = card.querySelector('.card-saved-badge');
          if (b) b.remove();
          dot.classList.remove('done');
        }
      });
    }

    function nextMonthStr(ym) {
      const [y, m] = ym.split('-').map(Number);
      const d = new Date(y, m, 1); // m je 1-12, new Date(y, m, 1) = první den měsíce m+1
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    }

    function addRecord(type) {
      const inp = document.getElementById(type + '-value');
      const value = inp.value;
      if (!value) { showToast('⚠ Vyplň hodnotu!'); return; }

      let records = getRecords();
      // přepsat pokud existuje pro tento měsíc
      records[type] = records[type].filter(r => !r.date.startsWith(currentMonth));
      records[type].push({ value: parseFloat(value), date: currentMonth + '-01' });
      records[type].sort((a, b) => new Date(a.date) - new Date(b.date));
      localStorage.setItem('utility-records', JSON.stringify(records));

      inp.value = '';
      updateCardState();
      updateLastRecords();

      const allDone = ['water', 'gas', 'electric'].every(t => hasRecordForMonth(records, t, currentMonth));
      if (allDone) {
        const nm = nextMonthStr(currentMonth);
        showToast('✅ Všechny 3 odečty uloženy! Přepínám na ' + formatMonth(nm) + '…', 3500);
        setTimeout(() => {
          currentMonth = nm;
          document.getElementById('current-month').value = currentMonth;
          updateCardState();
          updateLastRecords();
        }, 1000);
      } else {
        showToast('✓ Uloženo');
      }
    }

    function formatMonth(ym) {
      return new Date(ym + '-01').toLocaleDateString('cs-CZ', { month: 'long', year: 'numeric' });
    }

    function updateLastRecords() {
      const records = getRecords();
      const getVal = (type) => {
        return records[type].find(r => r.date.startsWith(currentMonth)) ||
               (records[type].length ? records[type][records[type].length - 1] : null);
      };
      const w = getVal('water'), g = getVal('gas'), e = getVal('electric');
      if (!w && !g && !e) { document.getElementById('last-records').innerHTML = ''; return; }

      let html = '<div class="stats-box"><h4>Hodnoty — ' + formatMonth(currentMonth) + '</h4>';
      if (w) html += '<div class="stat-row"><span>💧 Voda</span><span class="stat-value">' + w.value + ' m³</span></div>';
      if (g) html += '<div class="stat-row"><span>🔥 Plyn</span><span class="stat-value">' + g.value + ' m³</span></div>';
      if (e) html += '<div class="stat-row"><span>⚡ Elektřina</span><span class="stat-value">' + e.value + ' kWh</span></div>';
      html += '</div>';

    function switchPanel(panelId, btn) {

          monthMap[key][type] = r.value;

      Object.keys(monthMap).sort().reverse().forEach(m => {
        const d = monthMap[m];
        html += '<div class="stats-box"><h4>' + formatMonth(m) + '</h4>' +
          '<div class="stat-row"><span>💧 Voda</span><span class="stat-value">' + (d.water != null ? d.water + ' m³' : '—') + '</span></div>' +
          '<div class="stat-row"><span>🔥 Plyn</span><span class="stat-value">' + (d.gas != null ? d.gas + ' m³' : '—') + '</span></div>' +
          '<div class="stat-row"><span>⚡ Elektřina</span><span class="stat-value">' + (d.electric != null ? d.electric + ' kWh' : '—') + '</span></div>' +
          '<button class="delete-btn" onclick="deleteMonth(\\'' + m + '\\')">SMAZAT MĚSÍC</button></div>';
      });

      document.getElementById('archive-content').innerHTML = html || '<div class="empty-state"><p>Zatím žádné záznamy</p></div>';
    }

    function updateYearlyView() {
      const records = getRecords();

      // Sestavíme monthMap: { 'YYYY-MM': { water, gas, electric } }
      const monthMap = {};
      ['water','gas','electric'].forEach(type => {
        records[type].forEach(r => {
          const key = r.date.slice(0,7);
          if (!monthMap[key]) monthMap[key] = { water: null, gas: null, electric: null };
          monthMap[key][type] = r.value;
        });
      });

      const allMonths = Object.keys(monthMap).sort();
      if (!allMonths.length) {
        document.getElementById('yearly-content').innerHTML = '<div class="empty-state"><p>Zatím žádné záznamy</p></div>';
        return;
      }

      // Seskupíme po letech
      const yearMap = {};
      allMonths.forEach(m => {

      });

      Object.keys(yearMap).sort().reverse().forEach(year => {

        const gs = (arr) => arr.length > 0 ? {
          min: Math.min(...arr), max: Math.max(...arr),
          avg: (arr.reduce((a,b)=>a+b)/arr.length).toFixed(2),
          sum: arr.reduce((a,b)=>a+b, 0).toFixed(2)
        } : null;

        html += '<div class="stats-box"><h4>ROK ' + year + ' &nbsp;—&nbsp; ' + yMonths.length + ' měsíců</h4>';

        // Tabulka měsíců
        html += '<div style="overflow-x:auto;margin-bottom:12px">' +

          '<thead><tr style="border-bottom:1px solid rgba(0,212,255,0.3)">' +
          '<th style="text-align:left;padding:5px 4px;color:var(--text-muted);font-weight:normal;letter-spacing:1px">MĚSÍC</th>' +
          '<th style="text-align:right;padding:5px 4px;color:#00d4ff">💧 m³</th>' +
          '<th style="text-align:right;padding:5px 4px;color:#ff8c00">🔥 m³</th>' +
          '<th style="text-align:right;padding:5px 4px;color:#ffff00">⚡ kWh</th>' +
          '</tr></thead><tbody>';

        [...yMonths].reverse().forEach(m => {
          const d = monthMap[m];
          const idx = allMonths.indexOf(m);
          const prev = idx > 0 ? monthMap[allMonths[idx-1]] : null;
          const dW = (d.water != null && prev && prev.water != null) ? (d.water - prev.water).toFixed(1) : null;
          const dG = (d.gas != null && prev && prev.gas != null) ? (d.gas - prev.gas).toFixed(1) : null;
          const dE = (d.electric != null && prev && prev.electric != null) ? (d.electric - prev.electric).toFixed(1) : null;
          const fmtD = (v) => v === null ? '' : ' <span style="font-size:0.7rem;color:' + (parseFloat(v)>=0?'#00ff88':'#ff3c5a') + '">(' + (parseFloat(v)>=0?'+':'') + v + ')</span>';

          html += '<tr style="border-bottom:1px solid rgba(255,255,255,0.04)">' +
            '<td style="padding:5px 4px;color:var(--text-light)">' + formatMonth(m) + '</td>' +
            '<td style="text-align:right;padding:5px 4px;color:var(--accent-green)">' + (d.water != null ? d.water : '—') + fmtD(dW) + '</td>' +
            '<td style="text-align:right;padding:5px 4px;color:var(--accent-green)">' + (d.gas != null ? d.gas : '—') + fmtD(dG) + '</td>' +
            '<td style="text-align:right;padding:5px 4px;color:var(--accent-green)">' + (d.electric != null ? d.electric : '—') + fmtD(dE) + '</td>' +

          const unit = type === 'electric' ? 'kWh' : 'm³';

        html += '</div>';
        html += '</div>';

      document.getElementById('yearly-content').innerHTML = html;
    }

      const sel = document.getElementById('report-year-filter');
      const cur = sel.value;
      sel.innerHTML = '<option value="all">Všechny roky</option>';
      [...years].sort().reverse().forEach(y => {
        const o = document.createElement('option');
        o.value = y; o.textContent = y;
        if (y === cur) o.selected = true;
        sel.appendChild(o);
      });
    }

      const records = getRecords();
      const filterYear = document.getElementById('report-year-filter').value;
      const monthMap = {};

      ['water','gas','electric'].forEach(type => {
        records[type].forEach(r => {
          const y = r.date.split('-')[0];

          monthMap[key][type] = r.value;

      const diff = (val, pval) => (val != null && pval != null) ? (val - pval).toFixed(2) : null;
      const fmtDiff = (d) => d === null ? '—' : (parseFloat(d) >= 0 ? '+' + d : d);
      const fmtVal = (v, unit) => v != null ? v + ' ' + unit : '—';

      // Group months by year for section headers
      const yearGroups = {};
      months.forEach(m => {
        const y = m.split('-')[0];
        if (!yearGroups[y]) yearGroups[y] = [];
        yearGroups[y].push(m);

        '<h1>UTILITY TRACKER</h1>' +
        '<p>' + yearLabel + ' &nbsp;|&nbsp; Vygenerováno: ' + now + '</p>' +
        '</div>';

      Object.keys(yearGroups).sort().reverse().forEach(year => {
        const yMonths = yearGroups[year];

          '<div class="rpt-year-title">Rok ' + year + '</div>';

        [...yMonths].reverse().forEach((m, ri) => {
          const idx = months.indexOf(m);
          const d = monthMap[m];
          const prev = idx > 0 ? monthMap[months[idx-1]] : null;
          const dW = diff(d.water, prev ? prev.water : null);
          const dG = diff(d.gas, prev ? prev.gas : null);
          const dE = diff(d.electric, prev ? prev.electric : null);

          html += '<div class="rpt-month-block">' +
            '<div class="rpt-month-header">' + formatMonth(m) + '</div>' +
            '<table class="rpt-month-table">' +
              '<tr>' +
                '<td class="rpt-icon">💧</td>' +
                '<td class="rpt-label">Voda</td>' +
                '<td class="rpt-val">' + fmtVal(d.water, 'm³') + '</td>' +
                '<td class="rpt-diff-label">spotřeba</td>' +
                '<td class="rpt-diff ' + (dW !== null && parseFloat(dW) < 0 ? 'neg' : '') + '">' + fmtDiff(dW) + (dW !== null ? ' m³' : '') + '</td>' +
              '</tr>' +
              '<tr>' +
                '<td class="rpt-icon">🔥</td>' +
                '<td class="rpt-label">Plyn</td>' +
                '<td class="rpt-val">' + fmtVal(d.gas, 'm³') + '</td>' +
                '<td class="rpt-diff-label">spotřeba</td>' +
                '<td class="rpt-diff ' + (dG !== null && parseFloat(dG) < 0 ? 'neg' : '') + '">' + fmtDiff(dG) + (dG !== null ? ' m³' : '') + '</td>' +
              '</tr>' +
              '<tr>' +
                '<td class="rpt-icon">⚡</td>' +
                '<td class="rpt-label">Elektřina</td>' +
                '<td class="rpt-val">' + fmtVal(d.electric, 'kWh') + '</td>' +
                '<td class="rpt-diff-label">spotřeba</td>' +
                '<td class="rpt-diff ' + (dE !== null && parseFloat(dE) < 0 ? 'neg' : '') + '">' + fmtDiff(dE) + (dE !== null ? ' kWh' : '') + '</td>' +
              '</tr>' +
            '</table>' +
          '</div>';
        });

        html += '</div>'; // year-group
      });

      html += '<div class="rpt-footer"><span>UTILITY TRACKER — automaticky generovaná sestava</span><span>' + now + '</span></div>';
      document.getElementById('report-preview').innerHTML = html;
    }

    function printReport() {
      const content = document.getElementById('report-preview');
      if (!content || !content.innerHTML.trim() || content.querySelector('.empty-state')) {
        showToast('⚠ Nejprve vygeneruj sestavu v záložce Sestava');
        return;

      window.print();
      setTimeout(function() { pt.innerHTML = ''; }, 500);
    }

    updateCardState();
    updateLastRecords();
  <\/script>
</body>
</html>

  }

  .stars {
    font-size: 12px;
    letter-spacing: -1px;
  }

  .record-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .btn-icon {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 30px;
    height: 30px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .btn-icon:active { transform: scale(0.9); }
  .btn-icon.delete:active { background: #e74c3c; border-color: #e74c3c; color: #fff; }
  .btn-icon.edit:active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-icon.fav.on { color: #e74c3c; border-color: #e74c3c; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-disc { font-size: 64px; margin-bottom: 16px; opacity: 0.2; }
  .empty h3 { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--text); margin-bottom: 8px; }
  .empty p { font-size: 12px; line-height: 1.6; }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 28px;
    right: 50%;
    transform: translateX(50%);
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 28px;
    padding: 14px 28px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    cursor: pointer;
    box-shadow: 0 4px 28px rgba(74, 158, 255, 0.4);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    z-index: 200;
  }

  .fab:active { transform: translateX(50%) scale(0.96); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    z-index: 300;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 430px;
    margin: 0 auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    border-top: 1px solid var(--border);
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .form-group { margin-bottom: 14px; }

  .form-label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .form-input, .form-select {
    width: 100%;
    background: var(--groove);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus, .form-select:focus { border-color: var(--accent); }

  .rating-picker {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin: 4px 0;
  }

  .star-btn {
    background: none;
    border: none;
    color: var(--border);
    font-size: 28px;
    cursor: pointer;
    padding: 0;
    transition: all 0.15s;
  }

  .star-btn.active { color: var(--accent); }
  .star-btn:hover { transform: scale(1.1); }

  .btn-submit {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.06em;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
    font-weight: 700;
  }

  .btn-submit:active { opacity: 0.85; }

  /* STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    animation: slideIn 0.3s ease forwards;
    opacity: 0;
    transform: translateY(10px);
  }

  .stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 24px 0 12px;
    font-weight: 400;
  }

  .genre-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .genre-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    animation: slideIn 0.3s ease forwards;
    opacity: 0;
    transform: translateY(10px);
    font-size: 13px;
  }

  .genre-bar-wrap {
    flex: 1;
    height: 8px;
    background: var(--groove);
    border-radius: 4px;
    overflow: hidden;
  }

  .genre-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* FOTO POLE */
  .photo-section {
    margin-bottom: 14px;
    padding: 12px;
    background: var(--groove);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .photo-label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .photo-btn-group {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .photo-btn {
    flex: 1;
    padding: 8px 10px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 11px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .photo-btn:active { background: var(--accent); color: #000; }

  #photoInput { display: none; }

  .photo-preview {
    width: 100%;
    height: 100px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    object-fit: cover;
    display: none;
  }

  .photo-preview.show { display: block; }

  .photo-clear-btn {
    width: 100%;
    padding: 6px;
    background: transparent;
    border: 1px solid rgba(255,100,100,.5);
    color: #ff6464;
    font-size: 10px;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 6px;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-family: 'DM Mono', monospace;
  }

  .photo-clear-btn:active { background: rgba(255,100,100,.2); }

  /* SYNC BUTTONS */
  .sync-bar {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    margin-bottom: 12px;
  }
  .sync-btn {
    flex: 1;
    padding: 8px 10px;
    background: var(--groove);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sync-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); }
  #importFileInput { display: none; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #fff;
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* LIGHTBOX */
  #cd-lightbox{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);justify-content:center;align-items:center;}
  #cd-lightbox.open{display:flex;}
  #cd-lightbox img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:6px;box-shadow:0 0 40px rgba(74,158,255,.15);}
  #cd-lightbox-close{position:absolute;top:16px;right:20px;color:#fff;font-size:2rem;cursor:pointer;opacity:.7;}
  #cd-lightbox-close:hover{opacity:1;}

  /* DRAG & DROP */
  .record-card[draggable] { cursor: grab; }
  .record-card.dragging { opacity: .35; transform: scale(.97); }
  .record-card.drag-over { border-color: var(--accent) !important; box-shadow: 0 0 12px rgba(74,158,255,.3); }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"><\/script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"><\/script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"><\/script>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="app-title">KLADYXLAND</div>
      <div class="app-subtitle">Moje CD <span style="font-size:.55rem;color:rgba(255,255,255,.2);font-family:monospace;margin-left:6px;">ver.1.2.CD</span></div>
    </div>
    <div class="count-badge" id="countBadge">0 CD</div>
  </div>
  <div class="sync-bar">
    <button class="sync-btn" onclick="exportJSON()">⬇ Export</button>
    <span id="sync-dot" style="font-size:.75rem;color:#4a6d90;letter-spacing:.05em;margin-left:auto;align-self:center;">⏳ Načítám...</span>
    <button class="sync-btn" style="border-color:var(--accent);color:var(--accent);" onclick="cdSaveOrder()">💾 Sestava</button>
    <button class="sync-btn" onclick="document.getElementById('importFileInput').click()">⬆ Import</button>
    <input type="file" id="importFileInput" accept=".json" onchange="importJSON(event)">
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('kolekce', this)">Kolekce</button>
    <button class="tab" onclick="switchTab('oblibene', this)">♥ Oblíbené</button>
    <button class="tab" onclick="switchTab('statistiky', this)">Statistiky</button>
    <button class="tab" onclick="switchTab('seznam', this)">Seznam</button>
  </div>
</header>

<div class="search-bar" id="searchBar">
  <input class="search-input" id="searchInput" oninput="render()" placeholder="Hledat v kolekci..." type="text">
</div>
<div id="sortBar" style="display:flex;gap:6px;padding:0 16px 10px;align-items:center;">
  <span style="font-size:9px;letter-spacing:.1em;color:rgba(255,255,255,.3);text-transform:uppercase;font-family:monospace;margin-right:4px;">Řadit:</span>
  <button id="sortNone" onclick="setSort('none')" style="font-family:monospace;font-size:9px;letter-spacing:.08em;padding:5px 10px;border-radius:6px;border:1px solid rgba(0,245,255,.4);background:rgba(0,245,255,.15);color:#00f5ff;cursor:pointer;">Výchozí</button>
  <button id="sortArtist" onclick="setSort('artist')" style="font-family:monospace;font-size:9px;letter-spacing:.08em;padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.4);cursor:pointer;">A-Z Interpret</button>
  <button id="sortTitle" onclick="setSort('title')" style="font-family:monospace;font-size:9px;letter-spacing:.08em;padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.4);cursor:pointer;">A-Z Název</button>
</div>

<main id="mainContent"></main>

<button class="fab" onclick="openModal()">
  <span style="font-size:18px">+</span> Přidat CD
</button>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle">Nové CD</h2>

    <div class="form-group">
      <label class="form-label">Interpret</label>
      <input class="form-input" id="fArtist" placeholder="např. Daft Punk" type="text">
    </div>

    <div class="form-group">
      <label class="form-label">Název alba</label>
      <input class="form-input" id="fTitle" placeholder="např. Random Access Memories" type="text">
    </div>

    <div class="form-group">
      <label class="form-label">Rok vydání</label>
      <input class="form-input" id="fYear" placeholder="např. 2013" type="text">
    </div>

    <div class="form-group">
      <label class="form-label">Žánr</label>
      <select class="form-select" id="fGenre">
        <option value="Rock">Rock</option>
        <option value="Jazz">Jazz</option>
        <option value="Pop">Pop</option>
        <option value="Dance">Dance</option>
        <option value="Klasika">Klasika</option>
        <option value="Blues">Blues</option>
        <option value="Folk">Folk</option>
        <option value="Soul">Soul</option>
        <option value="Electronic">Electronic</option>
        <option value="Metal">Metal</option>
        <option value="Hip-Hop">Hip-Hop</option>
        <option value="Jiné">Jiné</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Hodnocení</label>
      <div class="rating-picker">
        <button class="star-btn" data-val="1" onclick="setRating(1)">★</button>
        <button class="star-btn" data-val="2" onclick="setRating(2)">★</button>
        <button class="star-btn" data-val="3" onclick="setRating(3)">★</button>
        <button class="star-btn" data-val="4" onclick="setRating(4)">★</button>
        <button class="star-btn" data-val="5" onclick="setRating(5)">★</button>
      </div>
    </div>

    <div class="photo-section">
      <label class="photo-label">📸 Obal CD</label>
      <div class="photo-btn-group">
        <button type="button" class="photo-btn" onclick="capturePhoto()">📷 Vyfotit</button>
        <button type="button" class="photo-btn" onclick="uploadPhoto()">📁 Vybrat</button>
      </div>
      <div id="cdDropZone" ondragover="event.preventDefault();this.style.borderColor='var(--accent2)'" ondragleave="this.style.borderColor='rgba(255,255,255,.1)'" ondrop="cdHandleDrop(event)" style="border:2px dashed rgba(255,255,255,.1);border-radius:8px;padding:12px;text-align:center;cursor:pointer;color:rgba(255,255,255,.35);font-size:.78rem;margin-top:8px;transition:border-color .2s;">
        📁 Přetáhni obal sem (PC)
      </div>
      <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoSelect(event)">
      <img class="photo-preview" id="photoPreview">
      <button type="button" class="photo-clear-btn" id="photoClearBtn" style="display:none;" onclick="clearPhoto()">Smazat fotku</button>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="saveRecord()">Přidat do sbírky</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── FIREBASE SYNC ─────────────────────────────────────────────
  const _fbConfig = {
    apiKey: "AIzaSyDmAf2CZILbYKR72XYd3iCj3pQgnqFYTp8",
    authDomain: "kladyxland.firebaseapp.com",
    databaseURL: "https://kladyxland-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "kladyxland",
    storageBucket: "kladyxland.firebasestorage.app",
    messagingSenderId: "178078059030",
    appId: "1:178078059030:web:8d8a0271b23a7aca2b4337"
  };
  if (!firebase.apps.length) firebase.initializeApp(_fbConfig);
  const _db = firebase.database();
  const _storage = firebase.storage();
  const _cdRef = _db.ref('cdRecordsDb');

  function _setSyncStatus(msg, color) {
    const el = document.getElementById('sync-dot');
    if (el) { el.textContent = msg; el.style.color = color || '#4a6d90'; }
  }
  // ──────────────────────────────────────────────────────────────

  const GENRE_COLORS = {
    Rock: '#c45c3a', Jazz: '#5a9ec4', Pop: '#c45a9e',
    Klasika: '#9ec45a', Blues: '#5ac49e', Folk: '#c4a45a',
    Soul: '#e8a04a', Electronic: '#4ab8e8', Metal: '#888',
    'Hip-Hop': '#c4843a', Jiné: '#aaa'
  };

  let records = JSON.parse(localStorage.getItem('cd_records') || '[]');
  let currentRating = 0;
  let currentTab = 'kolekce';
  let editingId = null;
  let currentPhoto = null;
  let currentPhotoFile = null;

  let _cdSaving = false;

  function cdSaveOrder() {
    save();
    showToast('Sestava uložena ✓');
  }

  function save() {
    _cdSaving = true;
    setTimeout(() => { _cdSaving = false; }, 3000);
    records.forEach((r, i) => { r.order = i; });
    localStorage.setItem('cd_records', JSON.stringify(records));
    updateBadge();
    const obj = {};
    records.forEach(r => { obj['id_' + r.id] = r; });
    _setSyncStatus('⏳ Ukládám...', '#f39c12');
    _cdRef.set(obj)
      .then(() => _setSyncStatus('✅ Synchronizováno', '#2ecc71'))
      .catch(e => { console.error('Firebase save error:', e); _setSyncStatus('❌ Chyba sync', '#e74c3c'); });
  }

  function updateBadge() {
    const n = records.length;
    document.getElementById('countBadge').textContent = n + ' CD';
  }

  function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    const sb = document.getElementById('searchBar');
    sb.style.display = (tab === 'statistiky' || tab === 'seznam') ? 'none' : 'block';
    render();
  }

  function render() {
    if (currentTab === 'statistiky') renderStats();
    else if (currentTab === 'seznam') renderSeznam();
    else renderList();
  }

  let currentSort = 'none';
  function setSort(type) {
    currentSort = type;
    ['sortNone','sortArtist','sortTitle'].forEach(id => {
      const btn = document.getElementById(id);
      if (!btn) return;
      btn.style.background = 'transparent';
      btn.style.borderColor = 'rgba(255,255,255,.15)';
      btn.style.color = 'rgba(255,255,255,.4)';
    });
    const activeId = type === 'none' ? 'sortNone' : type === 'artist' ? 'sortArtist' : 'sortTitle';
    const active = document.getElementById(activeId);
    if (active) { active.style.background = 'rgba(0,245,255,.15)'; active.style.borderColor = 'rgba(0,245,255,.4)'; active.style.color = '#00f5ff'; }
    render();
  }

  function renderList() {
    const query = (document.getElementById('searchInput')?.value || '').toLowerCase();
    let list = records.filter(r => {
      const match = r.artist.toLowerCase().includes(query) || r.title.toLowerCase().includes(query);
      if (currentTab === 'oblibene') return match && r.fav;
      return match;
    });
    if (currentSort === 'artist') list = [...list].sort((a, b) => a.artist.localeCompare(b.artist, 'cs'));
    else if (currentSort === 'title') list = [...list].sort((a, b) => a.title.localeCompare(b.title, 'cs'));

    const main = document.getElementById('mainContent');
    if (list.length === 0) {
      main.innerHTML = \`<div class="empty">
        <div class="empty-disc">💿</div>
        <h3>\${currentTab === 'oblibene' ? 'Žádné oblíbené' : 'Sbírka je prázdná'}</h3>
        <p>\${currentTab === 'oblibene' ? 'Klikni na srdíčko u CD,<br>aby se zobrazilo zde.' : 'Přidej své první CD<br>tlačítkem níže.'}</p>
      </div>\`;
      return;
    }

    main.innerHTML = list.map((r, i) => {
      const color = GENRE_COLORS[r.genre] || '#888';
      const stars = '★'.repeat(r.rating || 0) + '☆'.repeat(5 - (r.rating || 0));
      return \`<div class="record-card" draggable="true" data-id="\${r.id}" style="animation-delay:\${i * 0.05}s" ondragstart="cdDragStart(event)" ondragover="cdDragOver(event)" ondragleave="cdDragLeave(event)" ondrop="cdDrop(event)">
        \${r.photo ? \`<img src="\${r.photo}" style="width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0;cursor:pointer;" onclick="cdOpenLightbox('\${r.photo}')">\` : \`<div class="vinyl">
          <div class="vinyl-label"></div>
        </div>\`}
        <div class="record-info">
          <div class="record-artist">\${r.artist}</div>
          <div class="record-title">\${r.title}</div>
          <div class="record-meta">
            <span class="record-year">\${r.year || '—'}</span>
            <span class="record-genre">\${r.genre}</span>
            \${r.rating ? \`<span class="stars" style="color:\${color}">\${stars}</span>\` : ''}
          </div>
        </div>
        <div class="record-actions">
          <button class="btn-icon fav \${r.fav ? 'on' : ''}" onclick="toggleFav(\${r.id}, event)" title="Oblíbené">♥</button>
          <button class="btn-icon edit" onclick="editRecord(\${r.id}, event)" title="Upravit">✎</button>
          <button class="btn-icon delete" onclick="deleteRecord(\${r.id}, event)" title="Smazat">✕</button>
        </div>
      </div>\`;
    }).join('');
  }

  function renderStats() {
    const main = document.getElementById('mainContent');
    if (records.length === 0) {
      main.innerHTML = \`<div class="empty"><div class="empty-disc">💿</div><h3>Zatím žádná data</h3><p>Přidej CD pro zobrazení statistik.</p></div>\`;
      return;
    }

    const genres = {};
    let totalRating = 0, rated = 0;
    records.forEach(r => {

  function compressImage(file, maxWidth=1200, quality=0.75) {
    return new Promise((resolve) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        canvas.toBlob(blob => resolve(new File([blob], file.name, {type:'image/jpeg'})), 'image/jpeg', quality);
      };
      img.src = url;
    });
  }

        const valid = imported.every(r => r.artist && r.title);

    letter-spacing: 0.06em;
    border: 1px solid var(--border);
  }

  .item-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .btn-icon {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 30px; height: 30px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items:center; justify-content:center;
    transition: all 0.15s;
  }
  .btn-icon:active { transform: scale(0.9); }
  .btn-icon.delete:active { background: var(--red); border-color: var(--red); color: #fff; }
  .btn-icon.edit:active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-icon.fav.on { color: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px var(--glow); }

  /* EMPTY */
  .empty { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-icon { font-size:56px; margin-bottom:16px; opacity:0.3; }
  .empty h3 { font-family:'Orbitron',sans-serif; font-size:16px; color:var(--text); margin-bottom:8px; }
  .empty p { font-size:12px; line-height:1.6; }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 28px;
    right: 50%;
    transform: translateX(50%);
    background: var(--accent);
    color: #050d1a;
    border: none;
    border-radius: 28px;
    padding: 14px 28px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    cursor: pointer;
    box-shadow: 0 4px 28px rgba(58,143,255,0.4);
    display: flex; align-items:center; gap:8px;
    transition: all 0.2s;
    z-index: 200;
  }
  .fab:active { transform: translateX(50%) scale(0.96); }

  /* MODAL */
  .modal-overlay {
    position:fixed; inset:0;
    background: rgba(0,0,0,0.8);
    z-index:300;
    display:flex; align-items:flex-end;
    opacity:0; pointer-events:none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity:1; pointer-events:all; }

  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width:100%; max-width:430px; margin:0 auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    border-top: 1px solid var(--border);
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-handle {
    width:36px; height:4px;
    background: var(--border);
    border-radius:2px;
    margin: 0 auto 20px;
  }

  .modal h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    color: var(--accent);
    margin-bottom: 20px;
    text-shadow: 0 0 12px var(--glow);
  }

  .form-group { margin-bottom: 14px; }

  .form-label {
    display:block;
    font-size:10px; letter-spacing:0.12em;
    text-transform:uppercase; color:var(--muted);
    margin-bottom:6px;
  }

  .form-input, .form-select, .form-textarea {
    width:100%;
    background: var(--groove);
    border: 1px solid var(--border);
    border-radius:8px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size:13px;
    outline:none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance:none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color:var(--accent);
    box-shadow: 0 0 0 2px var(--glow);
  }
  .form-textarea { resize:none; height:70px; }

  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  .status-picker { display:flex; gap:8px; }

  .status-opt {
    flex:1; padding:10px 6px;
    border-radius:8px;
    border:1px solid var(--border);
    background: var(--groove);
    color: var(--muted);
    font-family:'DM Mono',monospace;
    font-size:11px; letter-spacing:0.06em;
    cursor:pointer; text-align:center;
    transition:all 0.15s;
  }
  .status-opt.active-ok { border-color:var(--green); color:var(--green); background:rgba(46,204,113,0.1); }
  .status-opt.active-repair { border-color:var(--orange); color:var(--orange); background:rgba(243,156,18,0.1); }
  .status-opt.active-off { border-color:var(--red); color:var(--red); background:rgba(231,76,60,0.1); }

  .btn-submit {
    width:100%;
    background: var(--accent);
    color: #050d1a;
    border:none; border-radius:10px;
    padding:14px;
    font-family:'DM Mono',monospace; font-size:14px; letter-spacing:0.06em;
    cursor:pointer; margin-top:8px;
    transition: opacity 0.2s;
    font-weight:700;
  }
  .btn-submit:active { opacity:0.85; }

  /* STATS */
  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }

  .stat-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:12px; padding:16px;
    animation: slideIn 0.3s ease forwards; opacity:0; transform:translateY(10px);
  }

  .stat-value {
    font-family:'Orbitron',sans-serif; font-size:22px; font-weight:900;
    color:var(--accent); margin-bottom:6px; text-shadow:0 0 12px var(--glow);
  }

  .stat-label { font-size:10px; color:var(--muted); letter-spacing:0.08em; }

  .section-label {
    font-size:10px; letter-spacing:0.15em; text-transform:uppercase;
    color:var(--muted); margin:24px 0 12px; font-weight:400;
  }

  .status-summary { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px; }

  .ss-card {
    background:var(--card); border:1px solid var(--border); border-radius:10px;
    padding:12px 8px; text-align:center;
    animation: slideIn 0.3s ease forwards; opacity:0; transform:translateY(10px);
  }

  .ss-val { font-family:'Orbitron',sans-serif; font-size:20px; font-weight:700; margin-bottom:4px; }
  .ss-lbl { font-size:9px; color:var(--muted); letter-spacing:0.06em; }

  .cat-list { display:flex; flex-direction:column; gap:10px; }

  .cat-row {
    display:flex; align-items:center; gap:12px;
    background:var(--card); border:1px solid var(--border); border-radius:10px;
    padding:10px 12px;
    animation: slideIn 0.3s ease forwards; opacity:0; transform:translateY(10px);
    font-size:13px;
  }

  .cat-bar-wrap { flex:1; height:8px; background:var(--groove); border-radius:4px; overflow:hidden; }
  .cat-bar { height:100%; border-radius:4px; transition:width 0.4s ease; }

  /* SYNC BUTTONS */
  .sync-bar {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    margin-bottom: 12px;
  }
  .sync-btn {
    flex: 1;
    padding: 8px 10px;
    background: var(--groove);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sync-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); }
  #importFileInput { display: none; }

  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #fff;
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* LIGHTBOX */
  #hw-lightbox{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);justify-content:center;align-items:center;}
  #hw-lightbox.open{display:flex;}
  #hw-lightbox img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:6px;box-shadow:0 0 40px rgba(0,245,255,.1);}
  #hw-lightbox-close{position:absolute;top:16px;right:20px;color:#fff;font-size:2rem;cursor:pointer;opacity:.7;}
  #hw-lightbox-close:hover{opacity:1;}

  /* DRAG & DROP */
  .item-card[draggable] { cursor: grab; }
  .item-card.dragging { opacity: .35; transform: scale(.97); }
  .item-card.drag-over { border-color: var(--accent) !important; box-shadow: 0 0 12px rgba(0,245,255,.3); }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"><\/script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"><\/script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"><\/script>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo-wrap">
      <div class="logo-icon">🎛️</div>
      <div>
        <div class="app-title">KLADYXLAND</div>
        <div class="app-subtitle">Studio Manager <span style="font-size:.55rem;color:rgba(255,255,255,.2);font-family:monospace;margin-left:6px;">ver.1.7HW</span></div>
      </div>
    </div>
    <div class="count-badge" id="countBadge">0 položek</div>
  </div>
  <div class="sync-bar">
    <button class="sync-btn" onclick="exportJSON()">⬇ Export</button>
    <span id="sync-dot" style="font-size:.75rem;color:#4a6d90;letter-spacing:.05em;margin-left:auto;align-self:center;">⏳ Načítám...</span>
    <button class="sync-btn" style="border-color:var(--accent);color:var(--accent);" onclick="hwSaveOrder()">💾 Sestava</button>
    <button class="sync-btn" onclick="document.getElementById('importFileInput').click()">⬆ Import</button>
    <input type="file" id="importFileInput" accept=".json" onchange="importJSON(event)">
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('vse', this)">Vše</button>
    <button class="tab" onclick="switchTab('oblibene', this)">★ Oblíbené</button>
    <button class="tab" onclick="switchTab('hardware', this)">Hardware</button>
    <button class="tab" onclick="switchTab('software', this)">Software</button>
    <button class="tab" onclick="switchTab('prislusenstvi', this)">Příslušenství</button>
    <button class="tab" onclick="switchTab('statistiky', this)">Statistiky</button>
    <button class="tab" onclick="switchTab('seznam', this)">Seznam</button>
  </div>
</header>

<div class="search-bar" id="searchBar">
  <input class="search-input" id="searchInput" oninput="render()" placeholder="Hledat vybavení..." type="text">
</div>

<main id="mainContent"></main>

<button class="fab" onclick="openModal()"><span style="font-size:16px">+</span> Přidat položku</button>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle">Nová položka</h2>

    <div class="form-group">
      <label class="form-label">Kategorie</label>
      <select class="form-select" id="fCat" onchange="updateCatIcon()">
        <option value="Hardware">🎛️ Hardware</option>
        <option value="Software">💿 Software</option>
        <option value="Příslušenství">🎧 Příslušenství</option>
        <option value="Světla">💡 Světla / AV</option>
        <option value="Kabely">🔌 Kabely</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Název</label>
      <input class="form-input" id="fName" placeholder="např. Pioneer CDJ-3000" type="text">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Výrobce / Brand</label>
        <input class="form-input" id="fBrand" placeholder="Pioneer DJ" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">Sériové číslo</label>
        <input class="form-input" id="fSerial" placeholder="nepovinné" type="text">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Rok / Verze</label>
        <input class="form-input" id="fYear" placeholder="2022" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">Cena (Kč)</label>
        <input class="form-input" id="fPrice" placeholder="nepovinné" type="number">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Stav</label>
      <div class="status-picker">
        <div class="status-opt active-ok" id="sOk" onclick="setStatus('ok')">✓ Funkční</div>
        <div class="status-opt" id="sRepair" onclick="setStatus('repair')">⚠ V opravě</div>
        <div class="status-opt" id="sOff" onclick="setStatus('off')">✕ Vyřazeno</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Poznámky</label>
      <textarea class="form-textarea" id="fNotes" placeholder="Umístění, stav, licence…"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Fotka (volitelné)</label>
      <div id="hwDropZone" onclick="document.getElementById('fPhoto').click()" ondragover="event.preventDefault();this.style.borderColor='#00f5ff'" ondragleave="this.style.borderColor='rgba(0,245,255,.25)'" ondrop="hwHandleDrop(event)" style="border:2px dashed rgba(0,245,255,.25);border-radius:8px;padding:16px;text-align:center;cursor:pointer;color:rgba(0,245,255,.5);font-size:.8rem;transition:border-color .2s;">
        📁 Klikni nebo přetáhni fotku sem
      </div>
      <input class="form-input" id="fPhoto" type="file" accept="image/*" onchange="previewPhoto()" style="display:none;">
      <div id="photoPreview" style="margin-top:8px;max-width:100%;border-radius:6px;overflow:hidden;"></div>
      <button type="button" id="hwPhotoClearBtn" onclick="hwClearPhoto()" style="display:none;margin-top:6px;background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.4);color:#e74c3c;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.78rem;">✕ Smazat fotku</button>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="saveItem()">Přidat do inventáře</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── FIREBASE SYNC ─────────────────────────────────────────────
  const _fbConfig = {
    apiKey: "AIzaSyDmAf2CZILbYKR72XYd3iCj3pQgnqFYTp8",
    authDomain: "kladyxland.firebaseapp.com",
    databaseURL: "https://kladyxland-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "kladyxland",
    storageBucket: "kladyxland.firebasestorage.app",
    messagingSenderId: "178078059030",
    appId: "1:178078059030:web:8d8a0271b23a7aca2b4337"
  };
  if (!firebase.apps.length) firebase.initializeApp(_fbConfig);
  const _db = firebase.database();
  const _storage = firebase.storage();
  const _hwRef = _db.ref('hardwareDb');

  function _setSyncStatus(msg, color) {
    const el = document.getElementById('sync-dot');
    if (el) { el.textContent = msg; el.style.color = color || '#4a6d90'; }
  }
  // ──────────────────────────────────────────────────────────────

  const CAT_ICONS = {
    'Hardware':'🎛️','Software':'💿','Příslušenství':'🎧','Světla':'💡','Kabely':'🔌'
  };
  const CAT_COLORS = {
    'Hardware':'#3a8fff','Software':'#a855f7','Příslušenství':'#2ecc71',
    'Světla':'#f39c12','Kabely':'#e74c3c'
  };

  let items = JSON.parse(localStorage.getItem('kladyx_items') || '[]');
  let currentTab = 'vse';
  let currentStatus = 'ok';
  let editingId = null; // ID položky, která se edituje (null = přidávání nové)

  let _hwSaving = false;

  function hwSaveOrder() {
    save();
    showToast('Sestava uložena ✓');
  }

  function save() {
    _hwSaving = true;
    setTimeout(() => { _hwSaving = false; }, 3000);
    // Přidat order index každé položce
    items.forEach((it, i) => { it.order = i; });
    localStorage.setItem('kladyx_items', JSON.stringify(items));
    updateBadge();
    // Uložit do Firebase – konvertuj array na objekt keyed by id
    const obj = {};
    items.forEach(it => { obj['id_' + it.id] = it; });
    _setSyncStatus('⏳ Ukládám...', '#f39c12');
    _hwRef.set(obj)
      .then(() => _setSyncStatus('✅ Synchronizováno', '#2ecc71'))
      .catch(e => { console.error('Firebase save error:', e); _setSyncStatus('❌ Chyba sync', '#e74c3c'); });
  }

  function updateBadge() {
    const n = items.length;
    document.getElementById('countBadge').textContent = n + (n===1?' položka':n<5?' položky':' položek');
  }

  function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('searchBar').style.display = (tab==='statistiky'||tab==='seznam') ? 'none' : 'block';
    render();
  }

  function render() {
    if (currentTab === 'statistiky') renderStats();
    else if (currentTab === 'seznam') renderSeznam();
    else renderList();
  }

  function renderList() {
    const q = (document.getElementById('searchInput')?.value||'').toLowerCase();
    let list = items.filter(it => {
      const match = it.name.toLowerCase().includes(q) || it.brand.toLowerCase().includes(q);
      if (currentTab === 'oblibene') return match && it.fav;
      if (currentTab === 'hardware') return match && it.cat === 'Hardware';
      if (currentTab === 'software') return match && it.cat === 'Software';
      if (currentTab === 'prislusenstvi') return match && (it.cat==='Příslušenství'||it.cat==='Kabely'||it.cat==='Světla');
      return match;
    });

    const main = document.getElementById('mainContent');
    if (!list.length) {
      main.innerHTML = \`<div class="empty"><div class="empty-icon">🎛️</div><h3>Žádné vybavení</h3><p>Přidej první položku<br>do svého studia.</p></div>\`;
      return;
    }

    main.innerHTML = list.map((it, i) => {
      const color = CAT_COLORS[it.cat]||'#3a8fff';
      const dotClass = it.status==='ok'?'status-ok':it.status==='repair'?'status-repair':'status-off';
      const statusText = it.status==='ok'?'Funkční':it.status==='repair'?'V opravě':'Vyřazeno';
      return \`<div class="item-card" draggable="true" data-id="\${it.id}" style="animation-delay:\${i*0.045}s" ondragstart="hwDragStart(event)" ondragover="hwDragOver(event)" ondragleave="hwDragLeave(event)" ondrop="hwDrop(event)">
        <div class="item-icon" style="background:\${color}18;border-color:\${color}44">
          \${it.photo ? \`<img src="\${it.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;cursor:pointer;" onclick="hwOpenLightbox('\${it.photo}')">\` : CAT_ICONS[it.cat]||'🎵'}
        </div>
        <div class="item-info">
          <div class="item-category">\${it.cat}</div>
          <div class="item-name">\${it.name}</div>
          <div class="item-brand">\${it.brand}\${it.year?' · '+it.year:''}</div>
          <div class="item-meta">
            <span class="status-dot \${dotClass}"></span>
            <span class="status-label">\${statusText}</span>
            \${it.serial?\`<span class="tag">S/N: \${it.serial}</span>\`:''}
            \${it.price?\`<span class="tag">\${Number(it.price).toLocaleString('cs')} Kč</span>\`:''}
            \${it.photo?\`<span class="tag">📷</span>\`:''}
          </div>
          \${it.notes?\`<div style="font-size:11px;color:var(--muted);margin-top:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">\${it.notes}</div>\`:''}
        </div>
        <div class="item-actions">
          <button class="btn-icon fav \${it.fav?'on':''}" onclick="toggleFav(\${it.id},event)" title="Důležité">★</button>
          <button class="btn-icon edit" onclick="editItem(\${it.id},event)" title="Upravit">✎</button>
          <button class="btn-icon delete" onclick="deleteItem(\${it.id},event)" title="Smazat">✕</button>
        </div>
      </div>\`;
    }).join('');
  }

  function renderStats() {
    const main = document.getElementById('mainContent');
    if (!items.length) {
      main.innerHTML = \`<div class="empty"><div class="empty-icon">📊</div><h3>Zatím žádná data</h3><p>Přidej vybavení pro zobrazení statistik.</p></div>\`;
      return;
    }
    const ok = items.filter(i=>i.status==='ok').length;
    const repair = items.filter(i=>i.status==='repair').length;
    const off = items.filter(i=>i.status==='off').length;
    const totalVal = items.reduce((s,i)=>s+(+i.price||0),0);
    const cats = {};
    items.forEach(i=>{ cats[i.cat]=(cats[i.cat]||0)+1; });
    const maxCat = Math.max(...Object.values(cats));

    main.innerHTML = \`
      <div class="stats-grid">
        <div class="stat-card" style="animation-delay:0s"><div class="stat-value">\${items.length}</div><div class="stat-label">Celkem položek</div></div>
        <div class="stat-card" style="animation-delay:0.05s"><div class="stat-value">\${totalVal?totalVal.toLocaleString('cs')+' Kč':'—'}</div><div class="stat-label">Celková hodnota</div></div>
      </div>
      <div class="section-label">Stav vybavení</div>
      <div class="status-summary">
        <div class="ss-card" style="animation-delay:0.1s"><div class="ss-val" style="color:var(--green)">\${ok}</div><div class="ss-lbl">Funkční</div></div>
        <div class="ss-card" style="animation-delay:0.13s"><div class="ss-val" style="color:var(--orange)">\${repair}</div><div class="ss-lbl">V opravě</div></div>
        <div class="ss-card" style="animation-delay:0.16s"><div class="ss-val" style="color:var(--red)">\${off}</div><div class="ss-lbl">Vyřazeno</div></div>
      </div>
      <div class="section-label">Kategorie</div>

      year: document.getElementById('fYear').value.trim(),
      price: document.getElementById('fPrice').value.trim(),
      notes: document.getElementById('fNotes').value.trim(),
      status: currentStatus,
      photo: photoURL
    };

    if (editingId !== null) {
      // Editace existující položky
      const item = items.find(i => i.id === editingId);
      if (item) {

  function compressImage(file, maxWidth=1200, quality=0.75) {
    return new Promise((resolve) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        canvas.toBlob(blob => resolve(new File([blob], file.name, {type:'image/jpeg'})), 'image/jpeg', quality);
      };
      img.src = url;
    });
  }

  function hwDrop(e) {
    e.preventDefault();

    const targetId = parseInt(e.currentTarget.dataset.id);
    if (hwDragSrcId === targetId) return;
    const srcIdx = items.findIndex(i => i.id === hwDragSrcId);
    const tgtIdx = items.findIndex(i => i.id === targetId);
    if (srcIdx === -1 || tgtIdx === -1) return;
    const [moved] = items.splice(srcIdx, 1);
    items.splice(tgtIdx, 0, moved);

    reader.onload = (e) => {
      try {
        const imported = JSON.parse(e.target.result);
        if (!Array.isArray(imported)) throw new Error('Neplatný formát');
        const valid = imported.every(r => r.name);
