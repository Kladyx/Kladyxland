  .sync-bar {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    margin-bottom: 12px;
  }
  .sync-btn {
    flex: 1;
    padding: 8px 10px;
    background: var(--groove);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sync-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); }
  #importFileInput { display: none; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #fff;
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* LIGHTBOX */
  #lp-lightbox{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);justify-content:center;align-items:center;}
  #lp-lightbox.open{display:flex;}
  #lp-lightbox img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:6px;box-shadow:0 0 40px rgba(255,100,100,.1);}
  #lp-lightbox-close{position:absolute;top:16px;right:20px;color:#fff;font-size:2rem;cursor:pointer;opacity:.7;}
  #lp-lightbox-close:hover{opacity:1;}

  /* DRAG & DROP */
  .record-card[draggable] { cursor: grab; }
  .record-card.dragging { opacity: .35; transform: scale(.97); }
  .record-card.drag-over { border-color: var(--accent) !important; box-shadow: 0 0 12px rgba(99,102,241,.3); }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"><\/script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"><\/script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"><\/script>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="app-title">KLADYXLAND</div>
      <div class="app-subtitle">Moje LP desky <span style="font-size:.55rem;color:rgba(255,255,255,.2);font-family:monospace;margin-left:6px;">ver.1.9.LP</span></div>
    </div>
    <div class="count-badge" id="countBadge">0 desek</div>
  </div>
  <div class="sync-bar">
    <button class="sync-btn" onclick="exportJSON()">⬇ Export</button>
    <span id="sync-dot" style="font-size:.75rem;color:#4a6d90;letter-spacing:.05em;margin-left:auto;align-self:center;">⏳ Načítám...</span>
    <button class="sync-btn" style="border-color:var(--accent);color:var(--accent);" onclick="lpSaveOrder()">💾 Sestava</button>
    <button class="sync-btn" onclick="document.getElementById('importFileInput').click()">⬆ Import</button>
    <input type="file" id="importFileInput" accept=".json" onchange="importJSON(event)">
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('kolekce', this)">Kolekce</button>
    <button class="tab" onclick="switchTab('oblibene', this)">♥ Oblíbené</button>
    <button class="tab" onclick="switchTab('statistiky', this)">Statistiky</button>
    <button class="tab" onclick="switchTab('seznam', this)">Seznam</button>
  </div>
</header>

<div class="search-bar" id="searchBar">
  <input class="search-input" id="searchInput" oninput="render()" placeholder="Hledat v kolekci..." type="text">
</div>
<div id="sortBar" style="display:flex;gap:6px;padding:0 16px 10px;align-items:center;">
  <span style="font-size:9px;letter-spacing:.1em;color:rgba(255,255,255,.3);text-transform:uppercase;font-family:monospace;margin-right:4px;">Řadit:</span>
  <button id="sortNone" onclick="setSort('none')" style="font-family:monospace;font-size:9px;letter-spacing:.08em;padding:5px 10px;border-radius:6px;border:1px solid rgba(0,245,255,.4);background:rgba(0,245,255,.15);color:#00f5ff;cursor:pointer;">Výchozí</button>
  <button id="sortArtist" onclick="setSort('artist')" style="font-family:monospace;font-size:9px;letter-spacing:.08em;padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.4);cursor:pointer;">A-Z Interpret</button>
  <button id="sortTitle" onclick="setSort('title')" style="font-family:monospace;font-size:9px;letter-spacing:.08em;padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.4);cursor:pointer;">A-Z Název</button>
</div>

<main id="mainContent"></main>

<button class="fab" onclick="openModal()">
  <span style="font-size:18px">+</span> Přidat desku
</button>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle">Nová deska</h2>

    <div class="form-group">
      <label class="form-label">Interpret</label>
      <input class="form-input" id="fArtist" placeholder="např. Pink Floyd" type="text">
    </div>

    <div class="form-group">
      <label class="form-label">Název alba</label>
      <input class="form-input" id="fTitle" placeholder="např. The Dark Side of the Moon" type="text">
    </div>

    <div class="form-group">
      <label class="form-label">Rok vydání</label>
      <input class="form-input" id="fYear" placeholder="např. 1973" type="text">
    </div>

    <div class="form-group">
      <label class="form-label">Žánr</label>
      <select class="form-select" id="fGenre">
        <option value="Rock">Rock</option>
        <option value="Jazz">Jazz</option>
        <option value="Pop">Pop</option>
        <option value="Klasika">Klasika</option>
        <option value="Blues">Blues</option>
        <option value="Folk">Folk</option>
        <option value="Soul">Soul</option>
        <option value="Electronic">Electronic</option>
        <option value="Metal">Metal</option>
        <option value="Jiné">Jiné</option>
      </select>
    </div>

    <div class="photo-section">
      <label class="photo-label">📸 Obal desky</label>
      <div class="photo-btn-group">
        <button type="button" class="photo-btn" onclick="capturePhoto()">📷 Vyfotit</button>
        <button type="button" class="photo-btn" onclick="uploadPhoto()">📁 Vybrat</button>
      </div>
      <div id="lpDropZone" ondragover="event.preventDefault();this.style.borderColor='var(--accent2)'" ondragleave="this.style.borderColor='rgba(255,255,255,.1)'" ondrop="lpHandleDrop(event)" style="border:2px dashed rgba(255,255,255,.1);border-radius:8px;padding:12px;text-align:center;cursor:pointer;color:rgba(255,255,255,.35);font-size:.78rem;margin-top:8px;transition:border-color .2s;">
        📁 Přetáhni obal sem (PC)
      </div>
      <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoSelect(event)">
      <img class="photo-preview" id="photoPreview">
      <button type="button" class="photo-clear-btn" id="photoClearBtn" style="display:none;" onclick="clearPhoto()">Smazat fotku</button>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="saveRecord()">Přidat do sbírky</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── FIREBASE SYNC ─────────────────────────────────────────────
  const _fbConfig = {
    apiKey: "AIzaSyDmAf2CZILbYKR72XYd3iCj3pQgnqFYTp8",
    authDomain: "kladyxland.firebaseapp.com",
    databaseURL: "https://kladyxland-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "kladyxland",
    storageBucket: "kladyxland.firebasestorage.app",
    messagingSenderId: "178078059030",
    appId: "1:178078059030:web:8d8a0271b23a7aca2b4337"
  };
  if (!firebase.apps.length) firebase.initializeApp(_fbConfig);
  const _db = firebase.database();
  const _storage = firebase.storage();
  const _lpRef = _db.ref('lpRecordsDb');

  function _setSyncStatus(msg, color) {
    const el = document.getElementById('sync-dot');
    if (el) { el.textContent = msg; el.style.color = color || '#4a6d90'; }
  }
  // ──────────────────────────────────────────────────────────────

  const GENRE_COLORS = {
    Rock: '#c45c3a', Jazz: '#5a9ec4', Pop: '#c45a9e',
    Klasika: '#9ec45a', Blues: '#5ac49e', Folk: '#c4a45a',
    Soul: '#e8a04a', Electronic: '#4ab8e8', Metal: '#888', Jiné: '#aaa'
  };

  let records = JSON.parse(localStorage.getItem('lp_records') || '[]');
  let currentRating = 0;
  let currentTab = 'kolekce';
  let editingId = null; // ID desky, která se edituje (null = přidávání nové)
  let currentPhoto = null;
  let currentPhotoFile = null;

  let _lpSaving = false;

  function lpSaveOrder() {
    save();
    showToast('Sestava uložena ✓');
  }

  function save() {
    _lpSaving = true;
    setTimeout(() => { _lpSaving = false; }, 3000);
    // Přidat order index každé desce
    records.forEach((r, i) => { r.order = i; });
    localStorage.setItem('lp_records', JSON.stringify(records));
    updateBadge();
    // Uložit do Firebase – konvertuj array na objekt keyed by id
    const obj = {};
    records.forEach(r => { obj['id_' + r.id] = r; });
    _setSyncStatus('⏳ Ukládám...', '#f39c12');
    const fbOp = records.length === 0 ? _lpRef.remove() : _lpRef.set(obj);
    fbOp
      .then(() => _setSyncStatus('✅ Synchronizováno', '#2ecc71'))
      .catch(e => { console.error('Firebase save error:', e); _setSyncStatus('❌ Chyba sync', '#e74c3c'); });
  }

  function updateBadge() {
    const n = records.length;
    document.getElementById('countBadge').textContent = n + (n === 1 ? ' deska' : n < 5 ? ' desky' : ' desek');
  }

  function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    const sb = document.getElementById('searchBar');
    sb.style.display = (tab === 'statistiky' || tab === 'seznam') ? 'none' : 'block';
    render();
  }

  function render() {
    if (currentTab === 'statistiky') renderStats();
    else if (currentTab === 'seznam') renderSeznam();
    else renderList();
  }

  let currentSort = 'none';
  function setSort(type) {
    currentSort = type;
    ['sortNone','sortArtist','sortTitle'].forEach(id => {
      const btn = document.getElementById(id);
      if (!btn) return;
      btn.style.background = 'transparent';
      btn.style.borderColor = 'rgba(255,255,255,.15)';
      btn.style.color = 'rgba(255,255,255,.4)';
    });
    const activeId = type === 'none' ? 'sortNone' : type === 'artist' ? 'sortArtist' : 'sortTitle';
    const active = document.getElementById(activeId);
    if (active) { active.style.background = 'rgba(0,245,255,.15)'; active.style.borderColor = 'rgba(0,245,255,.4)'; active.style.color = '#00f5ff'; }
    render();
  }

  function renderList() {
    const query = (document.getElementById('searchInput')?.value || '').toLowerCase();
    let list = records.filter(r => {
      const match = r.artist.toLowerCase().includes(query) || r.title.toLowerCase().includes(query);
      if (currentTab === 'oblibene') return match && r.fav;
      return match;
    });
    if (currentSort === 'artist') list = [...list].sort((a, b) => a.artist.localeCompare(b.artist, 'cs'));
    else if (currentSort === 'title') list = [...list].sort((a, b) => a.title.localeCompare(b.title, 'cs'));

    const main = document.getElementById('mainContent');
    if (list.length === 0) {
      main.innerHTML = \`<div class="empty">
        <div class="empty-disc">◉</div>
        <h3>\${currentTab === 'oblibene' ? 'Žádné oblíbené' : 'Sbírka je prázdná'}</h3>
        <p>\${currentTab === 'oblibene' ? 'Klikni na srdíčko u desky,<br>aby se zobrazila zde.' : 'Přidej svou první LP desku<br>tlačítkem níže.'}</p>
      </div>\`;
      return;
    }

    main.innerHTML = list.map((r, i) => {
      const color = GENRE_COLORS[r.genre] || '#888';
      const stars = '★'.repeat(r.rating || 0) + '☆'.repeat(5 - (r.rating || 0));
      return \`<div class="record-card" draggable="true" data-id="\${r.id}" style="animation-delay:\${i * 0.05}s" ondragstart="lpDragStart(event)" ondragover="lpDragOver(event)" ondragleave="lpDragLeave(event)" ondrop="lpDrop(event)">
        \${r.photo ? \`<img src="\${r.photo}" style="width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0;cursor:pointer;" onclick="lpOpenLightbox('\${r.photo}')">\` : \`<div class="vinyl">
          <div class="vinyl-label" style="background:\${color}">\${r.genre.substring(0,2).toUpperCase()}</div>
        </div>\`}
        <div class="record-info">
          <div class="record-artist">\${r.artist}</div>
          <div class="record-title">\${r.title}</div>
          <div class="record-meta">
            <span class="record-year">\${r.year || '—'}</span>
            <span class="record-genre">\${r.genre}</span>
            \${r.rating ? \`<span class="stars" style="color:\${color}">\${stars}</span>\` : ''}
          </div>
        </div>
        <div class="record-actions">
          <button class="btn-icon fav \${r.fav ? 'on' : ''}" onclick="toggleFav(\${r.id}, event)" title="Oblíbené">♥</button>
          <button class="btn-icon edit" onclick="editRecord(\${r.id}, event)" title="Upravit">✎</button>
          <button class="btn-icon delete" onclick="deleteRecord(\${r.id}, event)" title="Smazat">✕</button>
        </div>
      </div>\`;
    }).join('');
  }

  function renderStats() {
    const main = document.getElementById('mainContent');
    if (records.length === 0) {
      main.innerHTML = \`<div class="empty"><div class="empty-disc">◉</div><h3>Zatím žádná data</h3><p>Přidej desky pro zobrazení statistik.</p></div>\`;
      return;
    }

    const genres = {};
    let totalRating = 0, rated = 0;
    records.forEach(r => {
      genres[r.genre] = (genres[r.genre] || 0) + 1;
      if (r.rating) { totalRating += r.rating; rated++; }
    });

    const topGenre = Object.entries(genres).sort((a,b) => b[1]-a[1])[0];
    const avgRating = rated ? (totalRating / rated).toFixed(1) : '—';
    const favCount = records.filter(r => r.fav).length;
    const maxGenre = topGenre[1];

    main.innerHTML = \`
      <div class="stats-grid">
        <div class="stat-card" style="animation-delay:0s"><div class="stat-value">\${records.length}</div><div class="stat-label">Celkem desek</div></div>
        <div class="stat-card" style="animation-delay:0.05s"><div class="stat-value">\${favCount}</div><div class="stat-label">Oblíbených</div></div>
        <div class="stat-card" style="animation-delay:0.1s"><div class="stat-value">\${avgRating}</div><div class="stat-label">Průměrné hodnocení</div></div>
        <div class="stat-card" style="animation-delay:0.15s"><div class="stat-value">\${Object.keys(genres).length}</div><div class="stat-label">Různých žánrů</div></div>
      </div>
      <div class="section-label">Žánry v kolekci</div>
      <div class="genre-list">
        \${Object.entries(genres).sort((a,b)=>b[1]-a[1]).map(([g, n], i) => \`
          <div class="genre-row" style="animation-delay:\${0.2 + i*0.05}s">
            <span style="color:\${GENRE_COLORS[g]||'#aaa'};min-width:70px">\${g}</span>
            <div class="genre-bar-wrap"><div class="genre-bar" style="width:\${(n/maxGenre)*100}%;background:\${GENRE_COLORS[g]||'#aaa'}"></div></div>
            <span style="color:var(--muted);font-size:12px">\${n}</span>
          </div>\`).join('')}
      </div>\`;
  }

  function openModal() {
    editingId = null; // Přidávání nové desky
    document.getElementById('modalTitle').textContent = 'Nová deska';
    document.getElementById('submitBtn').textContent = 'Přidat do sbírky';
    document.getElementById('modalOverlay').classList.add('open');
    currentRating = 0;
    currentPhoto = null;
    document.getElementById('fArtist').value = '';
    document.getElementById('fTitle').value = '';
    document.getElementById('fYear').value = '';
    document.getElementById('fGenre').value = 'Rock';
    clearPhotoDisplay();
    setTimeout(() => document.getElementById('fArtist').focus(), 300);
  }

  function editRecord(id, e) {
    e.stopPropagation();
    const record = records.find(r => r.id === id);
    if (!record) return;

    editingId = id; // Nastavíme režim editace
    document.getElementById('modalTitle').textContent = 'Upravit desku';
    document.getElementById('submitBtn').textContent = 'Uložit změny';
    
    // Vyplníme formulář daty z desky
    document.getElementById('fArtist').value = record.artist;
    document.getElementById('fTitle').value = record.title;
    document.getElementById('fYear').value = record.year || '';
    document.getElementById('fGenre').value = record.genre;
    currentRating = record.rating || 0;
    
    // Fotka
    currentPhoto = (record.photo && record.photo.startsWith('http')) ? record.photo : null;
    if (currentPhoto) {
      document.getElementById('photoPreview').src = currentPhoto;
      document.getElementById('photoPreview').classList.add('show');
      document.getElementById('photoClearBtn').style.display = 'block';
    } else {
      clearPhotoDisplay();
    }
    
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('fArtist').focus(), 300);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editingId = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function setRating(val) {
    currentRating = val;
    updateStars();
  }

  function updateStars() {
    document.querySelectorAll('.star-btn').forEach(btn => {
      btn.classList.toggle('active', parseInt(btn.dataset.val) <= currentRating);
    });
  }

  async function saveRecord() {
    const artist = document.getElementById('fArtist').value.trim();
    const title = document.getElementById('fTitle').value.trim();
    
    if (!artist || !title) {
      document.getElementById('fArtist').style.borderColor = artist ? '' : 'var(--accent2)';
      document.getElementById('fTitle').style.borderColor = title ? '' : 'var(--accent2)';
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Ukládám...';

    let photoURL = (currentPhoto && currentPhoto.startsWith('http')) ? currentPhoto : null;
    if (currentPhotoFile) {
      try {
        const compressed = await compressImage(currentPhotoFile);
        const ref = _storage.ref('lp/' + Date.now() + '_' + compressed.name);
        await ref.put(compressed);
        photoURL = await ref.getDownloadURL();
        currentPhoto = photoURL;
        currentPhotoFile = null;
      } catch(e) { console.error('Upload fotky selhal:', e); }
    }

    const recordData = {
      artist,
      title,
      year: document.getElementById('fYear').value || '',
      genre: document.getElementById('fGenre').value,
      rating: currentRating,
      photo: photoURL
    };

    if (editingId !== null) {
      // Editace existující desky
      const record = records.find(r => r.id === editingId);
      if (record) {
        Object.assign(record, recordData);
      }
    } else {
      // Přidání nové desky
      records.push({
        id: Date.now(),
        ...recordData,
        fav: false
      });
    }

    btn.disabled = false;
    btn.textContent = editingId !== null ? 'Uložit změny' : 'Přidat do sbírky';
    save();
    closeModal();
    if (currentTab !== 'kolekce') switchTab('kolekce', document.querySelector('.tab'));
    else render();
  }

  function renderSeznam() {
    const main = document.getElementById('mainContent');
    if (records.length === 0) {
      main.innerHTML = \`<div class="empty"><div class="empty-disc">◉</div><h3>Sbírka je prázdná</h3><p>Přidej desky tlačítkem níže.</p></div>\`;
      return;
    }
    const sorted = [...records].sort((a, b) => a.artist.localeCompare(b.artist));
    main.innerHTML = \`
      <div style="padding:16px 16px 0;">
        <button onclick="exportCSV()" style="width:100%;padding:13px;background:var(--accent);border:none;color:#fff;font-weight:700;font-size:.95rem;border-radius:10px;cursor:pointer;letter-spacing:.04em;">⬇ Exportovat jako CSV</button>
      </div>
      <div style="padding:12px 16px 80px;">
        <table style="width:100%;border-collapse:collapse;font-size:.85rem;">
          <thead>
            <tr style="border-bottom:2px solid var(--accent);color:var(--muted);text-align:left;">
              <th style="padding:8px 6px;">#</th>
              <th style="padding:8px 6px;">Interpret</th>
              <th style="padding:8px 6px;">Album</th>
              <th style="padding:8px 6px;">Rok</th>
              <th style="padding:8px 6px;">Žánr</th>
              <th style="padding:8px 6px;">★</th>
            </tr>
          </thead>
          <tbody>
            \${sorted.map((r, i) => \`
              <tr style="border-bottom:1px solid rgba(255,255,255,.07);">
                <td style="padding:8px 6px;color:var(--muted);">\${i + 1}</td>
                <td style="padding:8px 6px;font-weight:600;">\${r.artist}</td>
                <td style="padding:8px 6px;">\${r.title}</td>
                <td style="padding:8px 6px;color:var(--muted);">\${r.year || '—'}</td>
                <td style="padding:8px 6px;color:var(--muted);">\${r.genre || '—'}</td>
                <td style="padding:8px 6px;">\${'★'.repeat(r.rating || 0)}</td>
              </tr>\`).join('')}
          </tbody>
        </table>
      </div>\`;
  }

  function exportCSV() {
    const sorted = [...records].sort((a, b) => a.artist.localeCompare(b.artist));
    const header = ['#', 'Interpret', 'Album', 'Rok', 'Zanr', 'Hodnoceni', 'Oblibene'];
    const rows = sorted.map((r, i) => [
      i + 1,
      '"' + (r.artist || '').replace(/"/g, '""') + '"',
      '"' + (r.title || '').replace(/"/g, '""') + '"',
      r.year || '',
      '"' + (r.genre || '').replace(/"/g, '""') + '"',
      r.rating || 0,
      r.fav ? 'Ano' : 'Ne'
    ]);
    const csv = [header, ...rows].map(r => r.join(',')).join('\\n');

    return new Promise((resolve) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);

  // ── Web Audio API vizualizace (jen owner) ─────────────────────────────
  let _audioActive = false;
  let _audioStream = null;
  let _audioCtx = null;
  let _drawActive = false;

  function stopAudioViz() {
    _audioActive = false;
    _drawActive = false;
    if (_audioStream) { _audioStream.getTracks().forEach(t => t.stop()); _audioStream = null; }
    if (_audioCtx) { _audioCtx.close(); _audioCtx = null; }
    // Obnovit CSS animace
    document.querySelectorAll('.eq-bar').forEach(b => { b.style.animation = ''; b.style.height = ''; b.style.opacity = ''; });
    document.querySelectorAll('.sig-bar').forEach(b => { b.style.animation = ''; b.style.height = ''; b.style.opacity = ''; });
    const btn = document.getElementById('audio-viz-btn');
    if (btn) { btn.textContent = '🎙 VIZ OFF'; btn.style.borderColor = 'rgba(0,212,255,.4)'; btn.style.color = 'rgba(0,212,255,.7)'; }
  }

  async function startAudioViz() {
    if (_audioActive) { stopAudioViz(); return; }
    try {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error('Mikrofon není dostupný v tomto prostředí.');
      }
      _audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const source = _audioCtx.createMediaStreamSource(_audioStream);
      const analyser = _audioCtx.createAnalyser();
      analyser.fftSize = 128;
      analyser.smoothingTimeConstant = 0.75;
      source.connect(analyser);
      _audioActive = true;
      _drawActive = true;

      const btn = document.getElementById('audio-viz-btn');
      if (btn) { btn.textContent = '🎙 VIZ ON'; btn.style.borderColor = 'rgba(0,255,100,.6)'; btn.style.color = '#00ff88'; }

      const eqBars = document.querySelectorAll('.eq-bar');
      const sigBars = document.querySelectorAll('.sig-bar');
      const bufLen = analyser.frequencyBinCount;
      const dataArr = new Uint8Array(bufLen);

      eqBars.forEach(b => b.style.animation = 'none');
      sigBars.forEach(b => b.style.animation = 'none');

      function draw() {
        if (!_drawActive) return;
        requestAnimationFrame(draw);
        analyser.getByteFrequencyData(dataArr);
        eqBars.forEach((bar, i) => {
          const idx = Math.floor(i * bufLen / eqBars.length);
          const val = dataArr[idx] / 255;
          const maxH = parseFloat(bar.style.getPropertyValue('--h')) || 20;
          bar.style.height = Math.max(3, val * maxH * 2.2) + 'px';
          bar.style.opacity = 0.4 + val * 0.6;
        });
        const avg = dataArr.reduce((a, b) => a + b, 0) / bufLen / 255;
        sigBars.forEach((bar, i) => {
          const idx = Math.floor(i * bufLen / sigBars.length);
          const val = dataArr[idx] / 255;
          bar.style.height = Math.max(4, val * 48 + avg * 10) + 'px';
          bar.style.opacity = 0.3 + val * 0.7;
        });
      }
      draw();
    } catch(e) {
      console.warn('Audio vizualizace: přístup odepřen.', e);
    }
  }

  // Zobrazit tlačítko jen ownerovi
  window.addEventListener('load', function() {
